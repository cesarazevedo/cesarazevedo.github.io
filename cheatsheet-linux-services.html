<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviços de Rede Linux — Cheat Sheet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-theme="dark"] {
      --bg: #0f1117;
      --card-bg: #1e2130;
      --card-border: #2a2f45;
      --text-h: #f1f5f9;
      --text-sub: #94a3b8;
      --text-muted: #64748b;
      --grid-line: rgba(255,255,255,.03);
      --shadow: rgba(0,0,0,.35);
      --input-bg: #131720;
      --row-hover: rgba(255,255,255,.03);
      --row-alt: rgba(255,255,255,.015);
      --code-bg: rgba(255,255,255,.06);
      --footer: #2a2f45;
    }
    [data-theme="light"] {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --card-border: #dde3ec;
      --text-h: #0f172a;
      --text-sub: #475569;
      --text-muted: #94a3b8;
      --grid-line: rgba(0,0,0,.04);
      --shadow: rgba(0,0,0,.10);
      --input-bg: #f8fafc;
      --row-hover: rgba(0,0,0,.025);
      --row-alt: rgba(0,0,0,.012);
      --code-bg: rgba(0,0,0,.06);
      --footer: #94a3b8;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: background .3s;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--card-bg);
      border-bottom: 1px solid var(--card-border);
      box-shadow: 0 2px 12px var(--shadow);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      background: none; border: 1px solid var(--card-border);
      border-radius: 999px; padding: 5px 12px; cursor: pointer;
      font-size: .8rem; color: var(--text-sub); text-decoration: none;
      white-space: nowrap; transition: color .2s;
      display: flex; align-items: center; gap: 5px;
    }
    .back-btn:hover { color: var(--text-h); }

    .topbar-title {
      font-size: .95rem; font-weight: 700; color: var(--text-h);
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    .topbar-title .badge {
      font-size: .7rem; font-weight: 600; letter-spacing: .05em;
      background: rgba(16,185,129,.15); color: #10b981;
      border: 1px solid rgba(16,185,129,.3);
      border-radius: 999px; padding: 2px 8px;
    }

    .search-wrap {
      flex: 1; position: relative; max-width: 360px; margin-left: auto;
    }
    .search-wrap .icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: .9rem; pointer-events: none;
    }
    #search {
      width: 100%; background: var(--input-bg);
      border: 1px solid var(--card-border); border-radius: 10px;
      padding: 8px 12px 8px 34px; color: var(--text-h);
      font-family: inherit; font-size: .88rem; outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: #6366f1; }
    #search::placeholder { color: var(--text-muted); }

    .theme-toggle {
      background: none; border: 1px solid var(--card-border);
      border-radius: 999px; padding: 5px 12px; cursor: pointer;
      font-size: .8rem; color: var(--text-sub);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap; transition: color .2s;
    }
    .theme-toggle:hover { color: var(--text-h); }

    .filters-wrap {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99;
      background: var(--bg);
      border-bottom: 1px solid var(--card-border);
      padding: 10px 20px;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--card-border);
      border-radius: 999px; padding: 4px 12px;
      font-size: .75rem; font-weight: 600; cursor: pointer;
      background: none; color: var(--text-muted);
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .chip:hover { color: var(--text-sub); }
    .chip.active { color: #fff; border-color: transparent; }
    .chip[data-cat="all"].active    { background: #6366f1; }
    .chip[data-cat="dhcp"].active   { background: #3b82f6; }
    .chip[data-cat="dns"].active    { background: #10b981; }
    .chip[data-cat="proxy"].active  { background: #f59e0b; }
    .chip[data-cat="ssh"].active    { background: #8b5cf6; }
    .chip[data-cat="ftp"].active    { background: #ec4899; }
    .chip[data-cat="nfs"].active    { background: #14b8a6; }
    .chip[data-cat="smb"].active    { background: #f97316; }
    .chip[data-cat="web"].active    { background: #06b6d4; }
    .chip[data-cat="fw"].active     { background: #ef4444; }
    .chip[data-cat="vpn"].active    { background: #84cc16; color: #0f172a; }

    .scroll-body {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      overflow-y: auto;
    }
    .main { padding-bottom: 60px; }

    .count-bar {
      padding: 10px 24px 4px;
      color: var(--text-muted); font-size: .78rem;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%; border-collapse: collapse;
      min-width: 640px;
    }
    thead th {
      position: sticky; top: 0; z-index: 10;
      background: var(--card-bg);
      border-bottom: 1px solid var(--card-border);
      padding: 10px 16px;
      text-align: left; font-size: .72rem; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--text-muted);
    }
    thead th:first-child { padding-left: 24px; }
    thead th:last-child  { padding-right: 24px; text-align: center; }

    tbody tr {
      border-bottom: 1px solid var(--card-border);
      transition: background .12s;
    }
    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: var(--row-hover); }
    tbody tr.hidden { display: none; }

    td { padding: 12px 16px; vertical-align: middle; }
    td:first-child { padding-left: 24px; }
    td:last-child  { padding-right: 24px; text-align: center; }

    .cat-badge {
      display: inline-block;
      border-radius: 999px; padding: 2px 9px;
      font-size: .68rem; font-weight: 700; letter-spacing: .04em;
      white-space: nowrap;
    }

    .cmd-cell { font-family: 'Consolas', 'Fira Code', monospace; }
    .cmd-text { color: var(--text-h); font-size: .88rem; font-weight: 600; }

    .desc-cell { color: var(--text-sub); font-size: .88rem; max-width: 280px; }

    .ex-cell { display: flex; align-items: center; gap: 8px; }
    .ex-code {
      font-family: 'Consolas', 'Fira Code', monospace;
      font-size: .82rem; color: var(--text-sub);
      background: var(--code-bg);
      border-radius: 6px; padding: 3px 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 260px;
    }

    .copy-btn {
      flex-shrink: 0; background: none;
      border: 1px solid var(--card-border); border-radius: 6px;
      padding: 3px 8px; cursor: pointer;
      font-size: .72rem; color: var(--text-muted);
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }
    .copy-btn:hover { color: var(--text-h); border-color: var(--text-muted); }
    .copy-btn.copied { color: #10b981; border-color: #10b981; background: rgba(16,185,129,.1); }

    /* Category badge colors */
    .c-dhcp  { background: rgba(59,130,246,.15);   color: #60a5fa; }
    .c-dns   { background: rgba(16,185,129,.15);   color: #34d399; }
    .c-proxy { background: rgba(245,158,11,.15);   color: #fbbf24; }
    .c-ssh   { background: rgba(139,92,246,.15);   color: #a78bfa; }
    .c-ftp   { background: rgba(236,72,153,.15);   color: #f472b6; }
    .c-nfs   { background: rgba(20,184,166,.15);   color: #2dd4bf; }
    .c-smb   { background: rgba(249,115,22,.15);   color: #fb923c; }
    .c-web   { background: rgba(6,182,212,.15);    color: #22d3ee; }
    .c-fw    { background: rgba(239,68,68,.15);    color: #f87171; }
    .c-vpn   { background: rgba(132,204,22,.15);   color: #a3e635; }

    .empty {
      display: none; text-align: center;
      padding: 60px 20px; color: var(--text-muted); font-size: .9rem;
    }
    .empty .big { font-size: 2.5rem; margin-bottom: 12px; }

    .footer {
      text-align: center; padding: 20px;
      color: var(--footer); font-size: .75rem;
    }

    @media (max-width: 600px) {
      .topbar-title .badge { display: none; }
      .topbar-title { font-size: .85rem; }
      thead th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <a class="back-btn" href="https://cesarazevedo.github.io">← Voltar</a>
    <div class="topbar-title">
      🌐 Serviços de Rede Linux
      <span class="badge">Cheat Sheet</span>
    </div>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input id="search" type="search" placeholder="Buscar comando ou serviço…" oninput="filter()" autocomplete="off" />
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">☀️</span>
      <span id="theme-label">Claro</span>
    </button>
  </div>

  <!-- Category filters -->
  <div class="filters-wrap">
    <button class="chip active" data-cat="all"   onclick="setFilter('all')">Todos</button>
    <button class="chip" data-cat="dhcp"  onclick="setFilter('dhcp')">📡 DHCP</button>
    <button class="chip" data-cat="dns"   onclick="setFilter('dns')">🔎 DNS</button>
    <button class="chip" data-cat="proxy" onclick="setFilter('proxy')">🔀 Proxy</button>
    <button class="chip" data-cat="ssh"   onclick="setFilter('ssh')">🔐 SSH</button>
    <button class="chip" data-cat="ftp"   onclick="setFilter('ftp')">📂 FTP</button>
    <button class="chip" data-cat="nfs"   onclick="setFilter('nfs')">🗄️ NFS</button>
    <button class="chip" data-cat="smb"   onclick="setFilter('smb')">🪟 Samba</button>
    <button class="chip" data-cat="web"   onclick="setFilter('web')">🕸️ Web</button>
    <button class="chip" data-cat="fw"    onclick="setFilter('fw')">🛡️ Firewall</button>
    <button class="chip" data-cat="vpn"   onclick="setFilter('vpn')">🔒 VPN</button>
  </div>

  <div class="scroll-body" id="scroll-body">
  <div class="main">
    <div class="count-bar" id="count-bar"></div>
    <div class="table-wrap">
      <table id="tbl">
        <thead>
          <tr>
            <th style="width:110px">Serviço</th>
            <th style="width:230px">Comando / Arquivo</th>
            <th>Descrição</th>
            <th style="width:310px">Exemplo</th>
            <th style="width:60px"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty">
        <div class="big">🔍</div>
        Nenhum resultado para "<span id="empty-term"></span>"
      </div>
    </div>
    <p class="footer">César Azevedo · IFRN · Campus João Câmara</p>
  </div>
  </div>

  <script>
    const CATS = {
      dhcp:  { label: 'DHCP',    cls: 'c-dhcp'  },
      dns:   { label: 'DNS',     cls: 'c-dns'   },
      proxy: { label: 'Proxy',   cls: 'c-proxy' },
      ssh:   { label: 'SSH',     cls: 'c-ssh'   },
      ftp:   { label: 'FTP',     cls: 'c-ftp'   },
      nfs:   { label: 'NFS',     cls: 'c-nfs'   },
      smb:   { label: 'Samba',   cls: 'c-smb'   },
      web:   { label: 'Web',     cls: 'c-web'   },
      fw:    { label: 'Firewall',cls: 'c-fw'    },
      vpn:   { label: 'VPN',     cls: 'c-vpn'   },
    };

    const DATA = [
      // ── DHCP (isc-dhcp-server) ──────────────────────────────────────────────
      { cat:'dhcp', cmd:'apt install isc-dhcp-server',      desc:'Instala o servidor DHCP ISC',                          ex:'apt install isc-dhcp-server' },
      { cat:'dhcp', cmd:'/etc/dhcp/dhcpd.conf',             desc:'Arquivo principal de configuração do DHCP',            ex:'nano /etc/dhcp/dhcpd.conf' },
      { cat:'dhcp', cmd:'/etc/default/isc-dhcp-server',     desc:'Define a interface que o DHCP vai escutar',            ex:'INTERFACESv4="eth0"' },
      { cat:'dhcp', cmd:'subnet ... { ... }',               desc:'Declara escopo de endereços para uma sub-rede',         ex:'subnet 192.168.1.0 netmask 255.255.255.0 { ... }' },
      { cat:'dhcp', cmd:'range',                            desc:'Define intervalo de IPs para distribuição',             ex:'range 192.168.1.100 192.168.1.200;' },
      { cat:'dhcp', cmd:'option routers',                   desc:'Informa o gateway padrão aos clientes',                 ex:'option routers 192.168.1.1;' },
      { cat:'dhcp', cmd:'option domain-name-servers',       desc:'Informa servidores DNS aos clientes',                   ex:'option domain-name-servers 8.8.8.8, 8.8.4.4;' },
      { cat:'dhcp', cmd:'option domain-name',               desc:'Informa o nome de domínio aos clientes',               ex:'option domain-name "rede.local";' },
      { cat:'dhcp', cmd:'default-lease-time',               desc:'Tempo padrão de concessão em segundos',                ex:'default-lease-time 600;' },
      { cat:'dhcp', cmd:'max-lease-time',                   desc:'Tempo máximo de concessão em segundos',                ex:'max-lease-time 7200;' },
      { cat:'dhcp', cmd:'host (reserva)',                   desc:'Reserva IP fixo para um MAC específico',               ex:'host pc01 { hardware ethernet 00:11:22:33:44:55; fixed-address 192.168.1.50; }' },
      { cat:'dhcp', cmd:'systemctl start isc-dhcp-server',  desc:'Inicia o serviço DHCP',                                ex:'systemctl start isc-dhcp-server' },
      { cat:'dhcp', cmd:'systemctl enable isc-dhcp-server', desc:'Habilita o DHCP na inicialização',                     ex:'systemctl enable isc-dhcp-server' },
      { cat:'dhcp', cmd:'systemctl status isc-dhcp-server', desc:'Verifica o status do serviço DHCP',                    ex:'systemctl status isc-dhcp-server' },
      { cat:'dhcp', cmd:'dhcpd -t -cf dhcpd.conf',         desc:'Testa a sintaxe do arquivo de configuração',           ex:'dhcpd -t -cf /etc/dhcp/dhcpd.conf' },
      { cat:'dhcp', cmd:'/var/lib/dhcp/dhcpd.leases',      desc:'Arquivo com as concessões ativas',                     ex:'cat /var/lib/dhcp/dhcpd.leases' },
      { cat:'dhcp', cmd:'journalctl -u isc-dhcp-server',   desc:'Logs do serviço DHCP',                                 ex:'journalctl -u isc-dhcp-server -f' },

      // ── DNS (BIND9) ──────────────────────────────────────────────────────────
      { cat:'dns',  cmd:'apt install bind9',                desc:'Instala o servidor DNS BIND9',                         ex:'apt install bind9 bind9utils' },
      { cat:'dns',  cmd:'/etc/bind/named.conf',            desc:'Arquivo de configuração principal do BIND',            ex:'nano /etc/bind/named.conf' },
      { cat:'dns',  cmd:'/etc/bind/named.conf.options',    desc:'Opções globais: forwarders, recursão, ACLs',           ex:'nano /etc/bind/named.conf.options' },
      { cat:'dns',  cmd:'/etc/bind/named.conf.local',      desc:'Declara zonas locais (diretas e reversas)',             ex:'nano /etc/bind/named.conf.local' },
      { cat:'dns',  cmd:'zone "dominio.local"',            desc:'Declara uma zona DNS direta',                          ex:'zone "rede.local" { type master; file "/etc/bind/db.rede.local"; };' },
      { cat:'dns',  cmd:'zone "x.x.x.in-addr.arpa"',      desc:'Declara uma zona DNS reversa',                         ex:'zone "1.168.192.in-addr.arpa" { type master; file "/etc/bind/db.192"; };' },
      { cat:'dns',  cmd:'forwarders',                      desc:'Encaminha consultas não resolvidas localmente',         ex:'forwarders { 8.8.8.8; 8.8.4.4; };' },
      { cat:'dns',  cmd:'allow-query',                     desc:'Define quais hosts podem fazer consultas',             ex:'allow-query { any; };' },
      { cat:'dns',  cmd:'allow-recursion',                 desc:'Permite recursão para redes especificadas',             ex:'allow-recursion { 192.168.1.0/24; };' },
      { cat:'dns',  cmd:'Registro A',                      desc:'Mapeia nome de host para IPv4',                        ex:'pc01    IN  A  192.168.1.10' },
      { cat:'dns',  cmd:'Registro AAAA',                   desc:'Mapeia nome de host para IPv6',                        ex:'pc01    IN  AAAA  fe80::1' },
      { cat:'dns',  cmd:'Registro CNAME',                  desc:'Cria alias para outro nome de host',                   ex:'www     IN  CNAME  servidor' },
      { cat:'dns',  cmd:'Registro MX',                     desc:'Define servidor de e-mail da zona',                    ex:'@       IN  MX  10  mail.rede.local.' },
      { cat:'dns',  cmd:'Registro PTR',                    desc:'Resolução reversa (IP → nome)',                        ex:'10      IN  PTR  pc01.rede.local.' },
      { cat:'dns',  cmd:'Registro NS',                     desc:'Define servidores de nomes da zona',                   ex:'@       IN  NS   ns1.rede.local.' },
      { cat:'dns',  cmd:'named-checkconf',                 desc:'Verifica a sintaxe da configuração do BIND',           ex:'named-checkconf /etc/bind/named.conf' },
      { cat:'dns',  cmd:'named-checkzone',                 desc:'Verifica a sintaxe de um arquivo de zona',             ex:'named-checkzone rede.local /etc/bind/db.rede.local' },
      { cat:'dns',  cmd:'systemctl restart bind9',         desc:'Reinicia o serviço DNS',                               ex:'systemctl restart bind9' },
      { cat:'dns',  cmd:'rndc reload',                     desc:'Recarrega zonas sem reiniciar o BIND',                 ex:'rndc reload' },
      { cat:'dns',  cmd:'rndc flush',                      desc:'Limpa o cache do DNS',                                 ex:'rndc flush' },
      { cat:'dns',  cmd:'dig',                             desc:'Consulta DNS diretamente no servidor',                  ex:'dig @192.168.1.1 A servidor.rede.local' },
      { cat:'dns',  cmd:'dig -x',                          desc:'Consulta reversa de IP para nome',                     ex:'dig -x 192.168.1.10' },
      { cat:'dns',  cmd:'nslookup',                        desc:'Consulta interativa de registros DNS',                 ex:'nslookup servidor.rede.local 192.168.1.1' },
      { cat:'dns',  cmd:'host',                            desc:'Resolução simples de nome ou IP',                      ex:'host rede.local' },

      // ── Proxy (Squid) ────────────────────────────────────────────────────────
      { cat:'proxy', cmd:'apt install squid',              desc:'Instala o servidor proxy Squid',                       ex:'apt install squid' },
      { cat:'proxy', cmd:'/etc/squid/squid.conf',          desc:'Arquivo de configuração principal do Squid',           ex:'nano /etc/squid/squid.conf' },
      { cat:'proxy', cmd:'http_port',                      desc:'Define a porta de escuta do proxy',                    ex:'http_port 3128' },
      { cat:'proxy', cmd:'http_port (transparente)',       desc:'Proxy transparente (intercepta sem configurar cliente)', ex:'http_port 3128 intercept' },
      { cat:'proxy', cmd:'acl localnet',                   desc:'Define ACL de rede local permitida',                   ex:'acl localnet src 192.168.1.0/24' },
      { cat:'proxy', cmd:'http_access allow',             desc:'Permite acesso a uma ACL',                             ex:'http_access allow localnet' },
      { cat:'proxy', cmd:'http_access deny all',          desc:'Bloqueia todo o resto (regra final)',                   ex:'http_access deny all' },
      { cat:'proxy', cmd:'acl bloqueados dstdomain',      desc:'ACL de domínios bloqueados',                           ex:'acl bloqueados dstdomain .facebook.com .youtube.com' },
      { cat:'proxy', cmd:'acl horario time',              desc:'ACL com restrição de horário',                         ex:'acl horario time MTWHF 08:00-18:00' },
      { cat:'proxy', cmd:'acl sites_proibidos url_regex', desc:'ACL com expressão regular de URLs proibidas',          ex:'acl sites_proibidos url_regex -i /etc/squid/bloqueados.txt' },
      { cat:'proxy', cmd:'cache_mem',                     desc:'Define memória reservada para cache',                  ex:'cache_mem 256 MB' },
      { cat:'proxy', cmd:'maximum_object_size',           desc:'Tamanho máximo de objeto em cache',                    ex:'maximum_object_size 10 MB' },
      { cat:'proxy', cmd:'cache_dir',                     desc:'Define o diretório e tamanho do cache em disco',       ex:'cache_dir ufs /var/spool/squid 2048 16 256' },
      { cat:'proxy', cmd:'squid -z',                      desc:'Inicializa estrutura do cache em disco',               ex:'squid -z' },
      { cat:'proxy', cmd:'squid -k parse',                desc:'Testa a sintaxe do arquivo de configuração',           ex:'squid -k parse' },
      { cat:'proxy', cmd:'systemctl restart squid',       desc:'Reinicia o serviço Squid',                             ex:'systemctl restart squid' },
      { cat:'proxy', cmd:'/var/log/squid/access.log',     desc:'Log de acessos do proxy',                              ex:'tail -f /var/log/squid/access.log' },
      { cat:'proxy', cmd:'/var/log/squid/cache.log',      desc:'Log de operações do cache',                            ex:'tail -f /var/log/squid/cache.log' },
      { cat:'proxy', cmd:'squidclient mgr:info',          desc:'Estatísticas de uso do Squid',                         ex:'squidclient -h 127.0.0.1 mgr:info' },

      // ── SSH Server (sshd) ────────────────────────────────────────────────────
      { cat:'ssh',  cmd:'apt install openssh-server',      desc:'Instala o servidor SSH',                               ex:'apt install openssh-server' },
      { cat:'ssh',  cmd:'/etc/ssh/sshd_config',            desc:'Arquivo de configuração do servidor SSH',              ex:'nano /etc/ssh/sshd_config' },
      { cat:'ssh',  cmd:'Port',                            desc:'Muda a porta padrão do SSH',                           ex:'Port 2222' },
      { cat:'ssh',  cmd:'PermitRootLogin',                 desc:'Permite ou bloqueia login do root via SSH',            ex:'PermitRootLogin no' },
      { cat:'ssh',  cmd:'PasswordAuthentication',          desc:'Habilita ou desabilita autenticação por senha',        ex:'PasswordAuthentication no' },
      { cat:'ssh',  cmd:'PubkeyAuthentication',            desc:'Habilita autenticação por chave pública',              ex:'PubkeyAuthentication yes' },
      { cat:'ssh',  cmd:'AllowUsers',                      desc:'Restringe quais usuários podem se conectar',           ex:'AllowUsers joao maria' },
      { cat:'ssh',  cmd:'MaxAuthTries',                    desc:'Número máximo de tentativas de autenticação',          ex:'MaxAuthTries 3' },
      { cat:'ssh',  cmd:'ClientAliveInterval',             desc:'Intervalo de keepalive para clientes inativos',        ex:'ClientAliveInterval 300' },
      { cat:'ssh',  cmd:'ssh-keygen',                      desc:'Gera par de chaves SSH (pública e privada)',           ex:'ssh-keygen -t ed25519 -C "usuario@host"' },

    // ─── State ────────────────────────────────────────────────────────────────
    let activeFilter = 'all';
    let searchTerm = '';

    // ─── Render ───────────────────────────────────────────────────────────────
    function render() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = DATA.map((row) => {
        const cat = CATS[row.cat];
        const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        const exSafe   = esc(row.ex);
        const cmdSafe  = esc(row.cmd);
        const descSafe = esc(row.desc);
        const searchVal = esc((row.cat+' '+row.cmd+' '+row.desc+' '+row.ex).toLowerCase());
        const copyVal = row.ex.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
        return `<tr data-cat="${row.cat}" data-search="${searchVal}">
          <td><span class="cat-badge ${cat.cls}">${cat.label}</span></td>
          <td class="cmd-cell"><span class="cmd-text">${cmdSafe}</span></td>
          <td class="desc-cell">${descSafe}</td>
          <td class="ex-cell">
            <span class="ex-code" title="${exSafe}">${exSafe}</span>
          </td>
          <td>
            <button class="copy-btn" onclick="copyCmd(this,'${copyVal}')">⧉ Copiar</button>
          </td>
        </tr>`;
      }).join('');
      applyFilters();
    }

    function applyFilters() {
      const rows = document.querySelectorAll('#tbody tr');
      let visible = 0;
      rows.forEach(row => {
        const catMatch = activeFilter === 'all' || row.dataset.cat === activeFilter;
        const txtMatch = !searchTerm || row.dataset.search.includes(searchTerm);
        const show = catMatch && txtMatch;
        row.classList.toggle('hidden', !show);
        if (show) visible++;
      });
      const total = DATA.length;
      document.getElementById('count-bar').textContent =
        visible === total ? `${total} entradas` : `${visible} de ${total} entradas`;
      const empty = document.getElementById('empty');
      empty.style.display = visible === 0 ? 'block' : 'none';
      document.getElementById('empty-term').textContent = searchTerm;
    }

    function filter() {
      searchTerm = document.getElementById('search').value.trim().toLowerCase();
      applyFilters();
    }

    function setFilter(cat) {
      activeFilter = cat;
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
      applyFilters();
    }

    function copyCmd(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copiado';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '⧉ Copiar'; btn.classList.remove('copied'); }, 1800);
      });
    }

    // ─── Theme ────────────────────────────────────────────────────────────────
    const saved = localStorage.getItem('theme') || 'dark';
    setTheme(saved);

    function toggleTheme() { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      const d = t === 'dark';
      document.getElementById('theme-icon').textContent  = d ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = d ? 'Claro' : 'Escuro';
    }

    // ─── Layout ───────────────────────────────────────────────────────────────
    function layout() {
      const topbarH   = document.querySelector('.topbar').offsetHeight;
      const filtersEl = document.querySelector('.filters-wrap');
      filtersEl.style.top = topbarH + 'px';
      const total = topbarH + filtersEl.offsetHeight;
      document.getElementById('scroll-body').style.top = total + 'px';
    }
    window.addEventListener('resize', layout);

    // ─── Init ─────────────────────────────────────────────────────────────────
    render();
    layout();
  </script>
