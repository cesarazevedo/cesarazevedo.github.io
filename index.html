<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>César Azevedo — IFRN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Tokens por tema ── */
    [data-theme="dark"] {
      --bg:         #0f1117;
      --card-bg:    #1e2130;
      --card-border:#2a2f45;
      --text-h:     #f1f5f9;
      --text-sub:   #94a3b8;
      --text-muted: #64748b;
      --arrow:      #334155;
      --footer:     #2a2f45;
      --grid-line:  rgba(255,255,255,.03);
      --shadow:     rgba(0,0,0,.35);
      --toggle-bg:  #1e2130;
      --toggle-border: #2a2f45;
    }
    [data-theme="light"] {
      --bg:         #f0f4f8;
      --card-bg:    #ffffff;
      --card-border:#dde3ec;
      --text-h:     #0f172a;
      --text-sub:   #475569;
      --text-muted: #94a3b8;
      --arrow:      #cbd5e1;
      --footer:     #94a3b8;
      --grid-line:  rgba(0,0,0,.04);
      --shadow:     rgba(0,0,0,.10);
      --toggle-bg:  #ffffff;
      --toggle-border: #dde3ec;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 40px 16px;
      transition: background .3s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Toggle ── */
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      color: var(--text-sub);
      transition: background .3s, border-color .3s, color .2s;
      user-select: none;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .theme-toggle:hover { color: var(--text-h); }
    .theme-toggle .icon { font-size: 1rem; }

    /* ── Perfil ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 0 0 3px rgba(139,92,246,.3);
    }

    .profile h1 {
      color: var(--text-h);
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -.3px;
      transition: color .3s;
    }

    .profile .role {
      color: var(--text-sub);
      font-size: .9rem;
      transition: color .3s;
    }

    .profile .email {
      color: var(--text-muted);
      font-size: .82rem;
      text-decoration: none;
      transition: color .2s;
    }
    .profile .email:hover { color: var(--text-sub); }

    /* ── Cards ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-radius: 14px;
      text-decoration: none;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      transition: transform .18s, border-color .18s, box-shadow .18s, background .3s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
      border-radius: 14px 0 0 14px;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .card-icon {
      font-size: 1.6rem;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-text { flex: 1; }

    .card-title {
      color: var(--text-h);
      font-size: .97rem;
      font-weight: 600;
      transition: color .3s;
    }

    .card-sub {
      color: var(--text-muted);
      font-size: .8rem;
      margin-top: 2px;
      transition: color .3s;
    }

    .card-arrow {
      color: var(--arrow);
      font-size: 1rem;
      transition: color .18s, transform .18s;
    }
    .card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .footer {
      margin-top: 40px;
      color: var(--footer);
      font-size: .75rem;
      transition: color .3s;
    }
  </style>
</head>
<body>

  <!-- Botão de tema -->
  <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
    <span class="icon" id="theme-icon">☀️</span>
    <span id="theme-label">Claro</span>
  </button>

  <div class="profile">
    <div class="avatar">CA</div>
    <h1>César Azevedo</h1>
    <span class="role">Professor · IFRN</span>
    <a class="email" href="mailto:cesar.augusto@ifrn.edu.br">✉ cesar.augusto@ifrn.edu.br</a>
  </div>

  <div class="links">

    <a class="card" href="https://cesarazevedo.github.io/infodigitais" target="_blank"
       style="--accent: #3b82f6;">
      <div class="card-icon">💻</div>
      <div class="card-text">
        <div class="card-title">Educação em Tecnologias Digitais</div>
        <div class="card-sub">INFO1M · INFO1V</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="https://cesarazevedo.github.io/rc" target="_blank"
       style="--accent: #10b981;">
      <div class="card-icon">🌐</div>
      <div class="card-text">
        <div class="card-title">Redes de Computadores</div>
        <div class="card-sub">INFO2V</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="https://cesarazevedo.github.io/so" target="_blank"
       style="--accent: #8b5cf6;">
      <div class="card-icon">🖥️</div>
      <div class="card-text">
        <div class="card-title">Sistemas Operacionais de Rede</div>
        <div class="card-sub">INFO4V</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="https://cesarazevedo.github.io/aplicadainformatica" target="_blank"
       style="--accent: #f59e0b;">
      <div class="card-icon">⚡</div>
      <div class="card-text">
        <div class="card-title">Informática Aplicada</div>
        <div class="card-sub">Tecnologia em Energias Renováveis</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

  </div>

  <p class="footer">IFRN · Campus Natal Central</p>

  <script>
    // Carrega preferência salva ou usa escuro como padrão
    const saved = localStorage.getItem('theme') || 'dark';
    setTheme(saved);

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const isDark = theme === 'dark';
      document.getElementById('theme-icon').textContent  = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Claro' : 'Escuro';
    }
  </script>

</body>
</html>
