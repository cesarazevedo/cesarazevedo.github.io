<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreador de Hábitos — César Azevedo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-theme="dark"] {
      --bg: #0f1117;
      --card-bg: #1e2130;
      --card-border: #2a2f45;
      --text-h: #f1f5f9;
      --text-sub: #94a3b8;
      --text-muted: #64748b;
      --footer: #2a2f45;
      --grid-line: rgba(255,255,255,.03);
      --shadow: rgba(0,0,0,.35);
      --toggle-bg: #1e2130;
      --toggle-border: #2a2f45;
      --input-bg: #131720;
      --input-border: #2a2f45;
      --danger: #ef4444;
    }
    [data-theme="light"] {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --card-border: #dde3ec;
      --text-h: #0f172a;
      --text-sub: #475569;
      --text-muted: #94a3b8;
      --footer: #94a3b8;
      --grid-line: rgba(0,0,0,.04);
      --shadow: rgba(0,0,0,.10);
      --toggle-bg: #ffffff;
      --toggle-border: #dde3ec;
      --input-bg: #f8fafc;
      --input-border: #dde3ec;
      --danger: #ef4444;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 40px 16px 60px;
      transition: background .3s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .theme-toggle {
      position: fixed;
      top: 18px; right: 18px;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      color: var(--text-sub);
      transition: background .3s, border-color .3s, color .2s;
      user-select: none;
      box-shadow: 0 2px 8px var(--shadow);
      z-index: 10;
    }
    .theme-toggle:hover { color: var(--text-h); }

    .back-btn {
      position: fixed;
      top: 18px; left: 18px;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      color: var(--text-sub);
      text-decoration: none;
      transition: background .3s, border-color .3s, color .2s;
      box-shadow: 0 2px 8px var(--shadow);
      z-index: 10;
    }
    .back-btn:hover { color: var(--text-h); }

    .header {
      text-align: center;
      margin-bottom: 36px;
      margin-top: 16px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-h);
      letter-spacing: -.5px;
      transition: color .3s;
    }
    .header p {
      color: var(--text-muted);
      font-size: .88rem;
      margin-top: 6px;
      transition: color .3s;
    }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      transition: background .3s, border-color .3s;
      box-shadow: 0 4px 20px var(--shadow);
    }

    .card-title {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      transition: color .3s;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    label {
      font-size: .8rem;
      color: var(--text-sub);
      font-weight: 500;
      transition: color .3s;
    }

    input[type="text"],
    input[type="number"],
    select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text-h);
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .2s, background .3s;
      width: 100%;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
    }

    .habits-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .habit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .habit-row .habit-num {
      font-size: .75rem;
      color: var(--text-muted);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
      transition: color .3s;
    }

    .habit-row input[type="text"] {
      flex: 1;
    }

    .color-picker-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .color-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 2px solid var(--card-border);
      cursor: pointer;
      transition: border-color .2s, transform .15s;
    }
    .color-dot:hover { transform: scale(1.1); border-color: var(--text-muted); }

    .color-palette {
      display: none;
      position: absolute;
      right: 0;
      top: 38px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 24px var(--shadow);
      z-index: 50;
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      width: 160px;
    }
    .color-palette.open { display: grid; }

    .pal-color {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .15s, border-color .15s;
    }
    .pal-color:hover { transform: scale(1.15); }
    .pal-color.selected { border-color: var(--text-h); }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--danger); background: rgba(239,68,68,.1); }

    .add-habit-btn {
      width: 100%;
      margin-top: 4px;
      padding: 9px;
      background: none;
      border: 1px dashed var(--input-border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: .85rem;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
      font-family: inherit;
    }
    .add-habit-btn:hover {
      border-color: #6366f1;
      color: #6366f1;
      background: rgba(99,102,241,.05);
    }

    .options-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: .85rem;
      color: var(--text-sub);
      transition: color .3s;
      user-select: none;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #6366f1;
      cursor: pointer;
    }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .generate-btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.5); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .preview-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px 24px;
      transition: background .3s, border-color .3s;
    }

    .preview-title {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .preview-grid {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .preview-table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: .7rem;
    }

    .preview-table th {
      color: var(--text-muted);
      font-weight: 600;
      padding: 3px 4px;
      text-align: center;
      min-width: 20px;
    }

    .preview-table th.habit-th {
      text-align: left;
      min-width: 120px;
      padding-left: 0;
    }

    .preview-table td {
      text-align: center;
      padding: 4px;
    }

    .preview-table td.habit-name {
      text-align: left;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      padding-right: 8px;
    }

    .preview-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin: 0 auto;
      border: 1.5px solid currentColor;
    }

    .empty-state {
      color: var(--text-muted);
      font-size: .85rem;
      text-align: center;
      padding: 12px 0;
    }

    .footer {
      margin-top: 40px;
      color: var(--footer);
      font-size: .75rem;
      transition: color .3s;
    }
  </style>
</head>
<body>

  <a class="back-btn" href="https://cesarazevedo.github.io">← Voltar</a>

  <button class="theme-toggle" onclick="toggleTheme()">
    <span id="theme-icon">☀️</span>
    <span id="theme-label">Claro</span>
  </button>

  <div class="header">
    <h1>📋 Rastreador de Hábitos</h1>
    <p>Personalize e gere um PDF para imprimir e acompanhar seus hábitos</p>
  </div>

  <div class="container">

    <!-- Configuração do mês -->
    <div class="card">
      <div class="card-title">Mês de referência</div>
      <div class="form-row">
        <div class="form-group">
          <label for="month-name">Mês</label>
          <select id="month-name">
            <option>Janeiro</option>
            <option>Fevereiro</option>
            <option>Março</option>
            <option>Abril</option>
            <option>Maio</option>
            <option>Junho</option>
            <option>Julho</option>
            <option>Agosto</option>
            <option>Setembro</option>
            <option>Outubro</option>
            <option>Novembro</option>
            <option>Dezembro</option>
          </select>
        </div>
        <div class="form-group" style="max-width:110px">
          <label for="year">Ano</label>
          <input type="number" id="year" value="2026" min="2020" max="2099" />
        </div>
      </div>
    </div>

    <!-- Lista de hábitos -->
    <div class="card">
      <div class="card-title">Hábitos diários</div>
      <div class="habits-list" id="habits-list"></div>
      <button class="add-habit-btn" onclick="addHabit()">+ Adicionar hábito</button>
    </div>

    <!-- Opções -->
    <div class="card">
      <div class="card-title">Opções do PDF</div>
      <div class="options-row">
        <label class="checkbox-label">
          <input type="checkbox" id="opt-fill" />
          Círculos preenchidos
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="opt-weeklines" checked />
          Separar semanas
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="opt-numbers" checked />
          Numeração dos hábitos
        </label>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-card">
      <div class="preview-title">Pré-visualização</div>
      <div class="preview-grid">
        <div id="preview-content" class="empty-state">Adicione hábitos para visualizar</div>
      </div>
    </div>

    <!-- Botão gerar -->
    <button class="generate-btn" onclick="generatePDF()" id="gen-btn" disabled>
      ⬇ Gerar PDF
    </button>

  </div>

  <p class="footer">IFRN · Campus João Câmara</p>

  <script>
    const PALETTE = [
      '#93c5fd','#86efac','#f9a8d4','#fcd34d','#c4b5fd',
      '#fdba74','#67e8f9','#fca5a5','#a5b4fc','#d9f99d',
    ];

    let habits = [];
    let openPalette = null;

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return { r, g, b };
    }

    function addHabit(name = '', colorIdx = null) {
      const idx = habits.length;
      const color = PALETTE[colorIdx !== null ? colorIdx : idx % PALETTE.length];
      habits.push({ name, color });
      renderHabits();
      updatePreview();
    }

    function removeHabit(idx) {
      habits.splice(idx, 1);
      renderHabits();
      updatePreview();
    }

    function renderHabits() {
      const list = document.getElementById('habits-list');
      list.innerHTML = '';
      habits.forEach((h, i) => {
        const row = document.createElement('div');
        row.className = 'habit-row';
        row.innerHTML = `
          <span class="habit-num">${i + 1}.</span>
          <input type="text" placeholder="Nome do hábito" value="${escHtml(h.name)}"
            oninput="habits[${i}].name = this.value; updatePreview()" />
          <div class="color-picker-wrap" id="cpw-${i}">
            <div class="color-dot" style="background:${h.color}" onclick="togglePalette(${i}, event)" title="Escolher cor"></div>
            <div class="color-palette" id="pal-${i}">
              ${PALETTE.map((c, pi) => `
                <div class="pal-color ${c === h.color ? 'selected' : ''}"
                  style="background:${c}"
                  onclick="setColor(${i}, '${c}', event)"></div>
              `).join('')}
            </div>
          </div>
          <button class="remove-btn" onclick="removeHabit(${i})" title="Remover">×</button>
        `;
        list.appendChild(row);
      });

      document.getElementById('gen-btn').disabled = habits.length === 0;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function togglePalette(idx, e) {
      e.stopPropagation();
      const pal = document.getElementById(`pal-${idx}`);
      if (openPalette && openPalette !== pal) openPalette.classList.remove('open');
      pal.classList.toggle('open');
      openPalette = pal.classList.contains('open') ? pal : null;
    }

    function setColor(idx, color, e) {
      e.stopPropagation();
      habits[idx].color = color;
      if (openPalette) { openPalette.classList.remove('open'); openPalette = null; }
      renderHabits();
      updatePreview();
    }

    document.addEventListener('click', () => {
      if (openPalette) { openPalette.classList.remove('open'); openPalette = null; }
    });

    function updatePreview() {
      const container = document.getElementById('preview-content');
      if (habits.length === 0) {
        container.className = 'empty-state';
        container.innerHTML = 'Adicione hábitos para visualizar';
        return;
      }
      container.className = '';

      const showFill = document.getElementById('opt-fill').checked;
      const showWeeks = document.getElementById('opt-weeklines').checked;
      const showNums = document.getElementById('opt-numbers').checked;

      const days = Array.from({length: 31}, (_, i) => i + 1);

      let html = `<table class="preview-table">
        <thead><tr>
          <th class="habit-th">Hábito</th>
          ${days.map(d => `<th style="${showWeeks && (d===8||d===15||d===22||d===29) ? 'border-left:1.5px solid var(--card-border)' : ''}">${d}</th>`).join('')}
        </tr></thead>
        <tbody>`;

      habits.forEach((h, i) => {
        const rgb = hexToRgb(h.color);
        const dimColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.25)`;
        const fullColor = h.color;
        html += `<tr>
          <td class="habit-name">${showNums ? `${i+1}. ` : ''}${escHtml(h.name) || `Hábito ${i+1}`}</td>
          ${days.map(d => {
            const sep = showWeeks && (d===8||d===15||d===22||d===29) ? 'border-left:1.5px solid var(--card-border);' : '';
            const bg = showFill ? fullColor : 'transparent';
            const border = h.color;
            return `<td style="${sep}"><div class="preview-dot" style="background:${bg};border-color:${border}"></div></td>`;
          }).join('')}
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    document.getElementById('opt-fill').addEventListener('change', updatePreview);
    document.getElementById('opt-weeklines').addEventListener('change', updatePreview);
    document.getElementById('opt-numbers').addEventListener('change', updatePreview);

    function getDaysInMonth(monthName, year) {
      const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                      'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      const m = months.indexOf(monthName);
      return new Date(year, m + 1, 0).getDate();
    }

    function generatePDF() {
      if (habits.length === 0) return;

      const { jsPDF } = window.jspdf;
      const monthName = document.getElementById('month-name').value;
      const year = document.getElementById('year').value;
      const showFill = document.getElementById('opt-fill').checked;
      const showWeeks = document.getElementById('opt-weeklines').checked;
      const showNums = document.getElementById('opt-numbers').checked;
      const totalDays = getDaysInMonth(monthName, year);

      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      const PW = 297, PH = 210;

      // Layout constants
      const marginL = 10, marginT = 12, marginR = 10, marginB = 10;
      const labelW = 12;        // "DAILY" rotated label area
      const nameColW = 60;      // habit name column
      const daysAreaW = PW - marginL - labelW - nameColW - marginR;
      const colW = daysAreaW / totalDays;
      const rowH = Math.min(10, (PH - marginT - 40) / Math.max(habits.length, 1));
      const headerH = 14;
      const startY = marginT + 22;  // where habits start (after title + day headers)
      const gridTop = startY;

      // ── Background decoration: top-right botanical-style accent ──
      doc.setFillColor(245, 250, 245);
      doc.setDrawColor(220, 240, 220);

      // ── Month title ──
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(16);
      doc.setTextColor(80, 80, 80);
      doc.text(`${monthName} ${year}`, PW - marginR, marginT + 6, { align: 'right' });

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6);
      doc.setTextColor(160, 160, 160);
      doc.text('MÊS', PW - marginR, marginT + 11, { align: 'right' });

      // ── "DAILY" rotated label ──
      const labelX = marginL + labelW / 2;
      const labelY = gridTop + (habits.length * rowH) / 2;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.setTextColor(100, 100, 100);
      doc.text('DIÁRIO', labelX, labelY, { angle: 90, align: 'center' });

      // ── Day number headers ──
      const gridLeft = marginL + labelW + nameColW;
      const dayHeaderY = gridTop - 3;

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(6);
      doc.setTextColor(120, 120, 120);

      for (let d = 1; d <= totalDays; d++) {
        const cx = gridLeft + (d - 1) * colW + colW / 2;
        doc.text(String(d), cx, dayHeaderY, { align: 'center' });
      }

      // Week labels below day numbers
      const weekLabels = ['SEM 1','SEM 2','SEM 3','SEM 4','SEM 5'];
      const weekStarts = [1, 8, 15, 22, 29];
      doc.setFontSize(5);
      doc.setTextColor(180, 180, 180);
      weekStarts.forEach((ws, wi) => {
        if (ws > totalDays) return;
        const we = Math.min(ws + 6, totalDays);
        const cx = gridLeft + (ws - 1) * colW + ((we - ws + 1) * colW) / 2;
        doc.text(weekLabels[wi], cx, dayHeaderY + 4, { align: 'center' });
      });

      // ── Habit rows ──
      habits.forEach((h, i) => {
        const y = gridTop + i * rowH;
        const rgb = hexToRgb(h.color);

        // Alternating row background
        if (i % 2 === 0) {
          doc.setFillColor(250, 250, 252);
          doc.rect(marginL + labelW, y, nameColW + daysAreaW, rowH, 'F');
        }

        // Habit name column border
        doc.setDrawColor(220, 220, 225);
        doc.setLineWidth(0.15);
        doc.rect(marginL + labelW, y, nameColW, rowH);

        // Habit name text
        const label = (showNums ? `${i + 1}. ` : '') + (h.name.trim() || `Hábito ${i + 1}`);
        const truncated = doc.splitTextToSize(label, nameColW - 6)[0];
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.setTextColor(60, 60, 60);
        doc.text(truncated, marginL + labelW + 3, y + rowH / 2 + 1.2);

        // Circles for each day
        const cr = Math.min(2.8, rowH * 0.28);
        for (let d = 0; d < totalDays; d++) {
          const cx = gridLeft + d * colW + colW / 2;
          const cy = y + rowH / 2;

          if (showFill) {
            doc.setFillColor(rgb.r, rgb.g, rgb.b);
            doc.setDrawColor(rgb.r, rgb.g, rgb.b);
            doc.circle(cx, cy, cr, 'FD');
          } else {
            // Soft fill + colored stroke
            const lr = Math.min(255, rgb.r + 60);
            const lg = Math.min(255, rgb.g + 60);
            const lb = Math.min(255, rgb.b + 60);
            doc.setFillColor(lr, lg, lb);
            doc.setDrawColor(rgb.r, rgb.g, rgb.b);
            doc.setLineWidth(0.4);
            doc.circle(cx, cy, cr, 'FD');
          }
        }

        // Row separator
        doc.setDrawColor(220, 220, 225);
        doc.setLineWidth(0.1);
        doc.line(marginL + labelW + nameColW, y + rowH, gridLeft + daysAreaW, y + rowH);
        doc.line(marginL + labelW + nameColW, y, gridLeft + daysAreaW, y);
      });

      // ── Grid outer border ──
      const gridH = habits.length * rowH;
      doc.setDrawColor(180, 180, 190);
      doc.setLineWidth(0.4);
      doc.rect(marginL + labelW + nameColW, gridTop, daysAreaW, gridH);

      // ── Vertical day separators ──
      doc.setDrawColor(220, 220, 225);
      doc.setLineWidth(0.1);
      for (let d = 1; d < totalDays; d++) {
        const x = gridLeft + d * colW;
        const isWeekSep = showWeeks && (d === 7 || d === 14 || d === 21 || d === 28);
        if (isWeekSep) {
          doc.setDrawColor(160, 160, 175);
          doc.setLineWidth(0.5);
        } else {
          doc.setDrawColor(220, 220, 225);
          doc.setLineWidth(0.1);
        }
        doc.line(x, gridTop, x, gridTop + gridH);
      }

      // ── Habit name column outer border ──
      doc.setDrawColor(180, 180, 190);
      doc.setLineWidth(0.4);
      doc.rect(marginL + labelW, gridTop, nameColW, gridH);

      // ── Color legend ──
      if (habits.length > 0) {
        const legendY = gridTop + gridH + 8;
        if (legendY + 8 < PH - marginB) {
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(5.5);
          doc.setTextColor(140, 140, 140);
          let lx = marginL + labelW;
          habits.forEach((h, i) => {
            const rgb = hexToRgb(h.color);
            doc.setFillColor(rgb.r, rgb.g, rgb.b);
            doc.circle(lx + 2, legendY + 2, 2, 'F');
            doc.setTextColor(100, 100, 100);
            const label = (h.name.trim() || `Hábito ${i+1}`);
            doc.text(label.substring(0, 20), lx + 6, legendY + 3.5);
            lx += Math.min(label.length * 1.7 + 14, 55);
            if (lx > PW - marginR - 40) { lx = marginL + labelW; }
          });
        }
      }

      // ── Watermark / footer ──
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(5);
      doc.setTextColor(200, 200, 200);
      doc.text('Gerado em cesarazevedo.github.io', PW - marginR, PH - marginB, { align: 'right' });

      doc.save(`rastreador-${monthName.toLowerCase()}-${year}.pdf`);
    }

    // ── Theme ──
    const saved = localStorage.getItem('theme') || 'dark';
    setTheme(saved);

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      setTheme(cur === 'dark' ? 'light' : 'dark');
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const isDark = theme === 'dark';
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Claro' : 'Escuro';
    }

    // ── Init: pre-populate with example habits ──
    const currentMonth = new Date().toLocaleString('pt-BR', { month: 'long' });
    const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const sel = document.getElementById('month-name');
    const curIdx = new Date().getMonth();
    sel.selectedIndex = curIdx;

    ['Acordar cedo', 'Exercício físico', 'Leitura', 'Beber água'].forEach((name, i) => addHabit(name, i));
  </script>

</body>
</html>
