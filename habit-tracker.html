<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreador de Hábitos — César Azevedo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-theme="dark"] {
      --bg: #0f1117;
      --card-bg: #1e2130;
      --card-border: #2a2f45;
      --text-h: #f1f5f9;
      --text-sub: #94a3b8;
      --text-muted: #64748b;
      --footer: #2a2f45;
      --grid-line: rgba(255,255,255,.03);
      --shadow: rgba(0,0,0,.35);
      --toggle-bg: #1e2130;
      --toggle-border: #2a2f45;
      --input-bg: #131720;
      --input-border: #2a2f45;
    }
    [data-theme="light"] {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --card-border: #dde3ec;
      --text-h: #0f172a;
      --text-sub: #475569;
      --text-muted: #94a3b8;
      --footer: #94a3b8;
      --grid-line: rgba(0,0,0,.04);
      --shadow: rgba(0,0,0,.10);
      --toggle-bg: #ffffff;
      --toggle-border: #dde3ec;
      --input-bg: #f8fafc;
      --input-border: #dde3ec;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 40px 16px 60px;
      transition: background .3s;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--grid-line) 1px,transparent 1px),
                        linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .fixed-btn {
      position: fixed;
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .82rem;
      color: var(--text-sub);
      transition: background .3s, border-color .3s, color .2s;
      user-select: none;
      box-shadow: 0 2px 8px var(--shadow);
      z-index: 10;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      text-decoration: none;
    }
    .fixed-btn:hover { color: var(--text-h); }
    .fixed-btn.left  { top: 18px; left: 18px; }
    .fixed-btn.right { top: 18px; right: 18px; }

    .header { text-align: center; margin: 16px 0 32px; }
    .header h1 { font-size: 1.6rem; font-weight: 700; color: var(--text-h); letter-spacing: -.5px; }
    .header p  { color: var(--text-muted); font-size: .88rem; margin-top: 6px; }

    .container { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Cards ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px 22px;
      transition: background .3s, border-color .3s;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .card-title {
      font-size: .72rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px;
    }

    .form-row { display: flex; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    label { font-size: .8rem; color: var(--text-sub); font-weight: 500; }

    input[type="text"], input[type="number"], select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text-h);
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .2s, background .3s;
      width: 100%;
    }
    input:focus, select:focus { outline: none; border-color: #6366f1; }

    /* ── Section cards (collapsible) ── */
    .section-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      transition: background .3s, border-color .3s;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 22px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .section-head:hover { background: rgba(99,102,241,.04); }
    .section-badge {
      font-size: .7rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
    }
    .badge-daily   { background: rgba(99,102,241,.15);  color: #818cf8; }
    .badge-weekly  { background: rgba(16,185,129,.15);  color: #34d399; }
    .badge-monthly { background: rgba(245,158,11,.15);  color: #fbbf24; }

    .section-desc { flex: 1; font-size: .82rem; color: var(--text-muted); }
    .section-count { font-size: .78rem; color: var(--text-muted); }
    .section-arrow { font-size: .8rem; color: var(--text-muted); transition: transform .2s; }
    .section-arrow.open { transform: rotate(180deg); }

    .section-body { padding: 0 22px 18px; display: none; }
    .section-body.open { display: block; }

    /* ── Habit rows ── */
    .habits-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

    .habit-row {
      display: flex; align-items: center; gap: 8px;
      animation: fadeIn .18s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

    .habit-num { font-size:.72rem; color:var(--text-muted); width:18px; text-align:right; flex-shrink:0; }

    .color-wrap { position: relative; flex-shrink: 0; }
    .color-dot {
      width: 30px; height: 30px; border-radius: 8px;
      border: 2px solid var(--card-border); cursor: pointer;
      transition: transform .15s, border-color .2s;
    }
    .color-dot:hover { transform: scale(1.1); border-color: var(--text-muted); }

    .palette {
      display: none; position: absolute; right: 0; top: 36px;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 8px; z-index: 50;
      box-shadow: 0 8px 24px var(--shadow);
      grid-template-columns: repeat(5,1fr); gap: 5px; width: 150px;
    }
    .palette.open { display: grid; }
    .pal-swatch {
      width: 22px; height: 22px; border-radius: 6px; cursor: pointer;
      border: 2px solid transparent; transition: transform .15s, border-color .15s;
    }
    .pal-swatch:hover { transform: scale(1.15); }
    .pal-swatch.sel { border-color: var(--text-h); }

    .remove-btn {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: 1.1rem; padding: 4px; border-radius: 6px; line-height: 1;
      transition: color .2s, background .2s; flex-shrink: 0;
    }
    .remove-btn:hover { color: #ef4444; background: rgba(239,68,68,.1); }

    .move-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
    .move-btn {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: .55rem; padding: 1px 4px; border-radius: 3px; line-height: 1.5;
      transition: color .15s, background .15s;
    }
    .move-btn:hover:not([disabled]) { color: #6366f1; background: rgba(99,102,241,.1); }
    .move-btn[disabled] { opacity: .2; cursor: default; }

    /* ── Mode tabs ── */
    .mode-tabs { display: flex; gap: 4px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 4px; box-shadow: 0 4px 20px var(--shadow); }
    .mode-tab  { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: .88rem; font-weight: 600; font-family: inherit; transition: background .2s, color .2s; color: var(--text-muted); background: transparent; }
    .mode-tab.active { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,.35); }

    /* ── Fill mode ── */
    .fill-nav  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .fill-nav-btn { background: var(--toggle-bg); border: 1px solid var(--toggle-border); border-radius: 8px; padding: 6px 16px; cursor: pointer; font-size: 1.1rem; color: var(--text-sub); transition: background .2s, color .2s; font-family: inherit; }
    .fill-nav-btn:hover { color: var(--text-h); }
    .fill-month-title { font-size: 1rem; font-weight: 700; color: var(--text-h); }

    .fill-section-label { font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .fill-scroll { overflow-x: auto; padding-bottom: 4px; }
    .fill-table { border-collapse: collapse; font-size: .75rem; }
    .fill-table th { color: var(--text-muted); font-weight: 600; padding: 3px 1px; text-align: center; font-size: .65rem; min-width: 22px; }
    .fill-name-th { text-align: left; min-width: 130px; padding-left: 8px; }
    .fill-stat-th { min-width: 64px; padding-left: 6px; }
    .fill-wknd { background: rgba(100,116,139,.08); }
    .fill-dow  { font-size: .5rem; color: var(--text-muted); }
    .fill-name-td { padding: 3px 8px 3px 10px; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; color: var(--text-sub); position: relative; }
    .fill-stripe { position: absolute; left: 0; top: 2px; bottom: 2px; width: 3px; border-radius: 2px; }
    .fill-cell { width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin: 0 auto; transition: transform .1s; }
    .fill-cell:hover { transform: scale(1.18); background: rgba(99,102,241,.07); }
    .fill-dot { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid; transition: background .12s; }
    .fill-sq  { width: 11px; height: 11px; border-radius: 3px; border: 1.5px solid; transition: background .12s; }
    .fill-stat { padding: 2px 4px; }
    .fill-bar  { height: 4px; background: var(--card-border); border-radius: 2px; margin-bottom: 2px; overflow: hidden; }
    .fill-bar-inner { height: 100%; border-radius: 2px; transition: width .3s; }
    .fill-stat span { font-size: .6rem; color: var(--text-muted); }
    .fill-monthly-list { display: flex; flex-direction: column; gap: 8px; }
    .fill-monthly-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--input-border); border-radius: 8px; cursor: pointer; transition: border-color .2s, background .2s; color: var(--text-sub); font-size: .88rem; }
    .fill-monthly-item:hover { border-color: #6366f1; background: rgba(99,102,241,.04); }
    .fill-monthly-item.checked { color: var(--text-h); text-decoration: line-through; opacity: .7; }
    .fill-monthly-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: .7rem; color: #fff; font-weight: 700; flex-shrink: 0; transition: background .15s, border-color .15s; }

    .add-habit-btn {
      width: 100%; padding: 8px;
      background: none; border: 1px dashed var(--input-border); border-radius: 8px;
      color: var(--text-muted); font-size: .82rem; cursor: pointer;
      transition: border-color .2s, color .2s, background .2s; font-family: inherit;
    }
    .add-habit-btn:hover { border-color: #6366f1; color: #6366f1; background: rgba(99,102,241,.05); }

    .monthly-row { display: flex; align-items: center; gap: 8px; animation: fadeIn .18s ease; }

    /* ── Options ── */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .opt-label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: .83rem; color: var(--text-sub);
      user-select: none; padding: 8px 10px;
      border: 1px solid var(--input-border); border-radius: 8px;
      transition: border-color .2s, background .2s;
    }
    .opt-label:hover { border-color: #6366f1; background: rgba(99,102,241,.04); }
    .opt-label input[type="checkbox"] { accent-color: #6366f1; width: 15px; height: 15px; cursor: pointer; }

    /* ── Preview ── */
    .preview-wrap { overflow-x: auto; padding-bottom: 6px; }
    .preview-table { border-collapse: collapse; font-size: .65rem; }
    .preview-table th {
      color: var(--text-muted); font-weight: 600; padding: 2px 3px;
      text-align: center; min-width: 16px;
    }
    .preview-table th.ph { text-align: left; min-width: 100px; }
    .preview-table td { text-align: center; padding: 3px 2px; }
    .preview-table td.pn { text-align: left; color: var(--text-sub); white-space: nowrap; padding-right:6px; }
    .pdot { width:10px; height:10px; border-radius:50%; margin:0 auto; border:1.5px solid; }
    .psq  { width:10px; height:10px; border-radius:2px; margin:0 auto; border:1.5px solid; }
    .psec-label { font-size:.65rem; font-weight:700; color:var(--text-muted); letter-spacing:.06em;
                  text-transform:uppercase; padding:6px 0 2px; }
    .empty-state { color:var(--text-muted); font-size:.82rem; text-align:center; padding:10px 0; }

    /* ── Generate button ── */
    .generate-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      border: none; border-radius: 12px; color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
    }
    .generate-btn:hover  { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.5); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .footer { margin-top: 40px; color: var(--footer); font-size: .75rem; }
  </style>
</head>
<body>

  <a class="fixed-btn left" href="https://cesarazevedo.github.io">← Voltar</a>
  <button class="fixed-btn right" onclick="toggleTheme()">
    <span id="theme-icon">☀️</span><span id="theme-label">Claro</span>
  </button>

  <div class="header">
    <h1>📋 Rastreador de Hábitos</h1>
    <p>Preencha seus hábitos e gere um PDF mensal para imprimir</p>
  </div>

  <div class="container">

    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-config" onclick="setMode('config')">⚙ Configurar</button>
      <button class="mode-tab" id="tab-fill" onclick="setMode('fill')">✏ Preencher</button>
    </div>

    <div id="mode-config">

    <!-- Mês -->
    <div class="card">
      <div class="card-title">Mês de referência</div>
      <div class="form-group" style="margin-bottom:10px">
        <label>Nome</label>
        <input type="text" id="inp-name" placeholder="Seu nome (opcional)" oninput="saveState();updatePreview()" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mês</label>
          <select id="sel-month" onchange="saveState();updatePreview()">
            <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
            <option>Abril</option><option>Maio</option><option>Junho</option>
            <option>Julho</option><option>Agosto</option><option>Setembro</option>
            <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
          </select>
        </div>
        <div class="form-group" style="max-width:110px">
          <label>Ano</label>
          <input type="number" id="inp-year" value="2026" min="2020" max="2099" oninput="saveState();updatePreview()" />
        </div>
      </div>
    </div>

    <!-- Hábitos Diários -->
    <div class="section-card" id="sc-daily">
      <div class="section-head" onclick="toggleSection('daily')">
        <span class="section-badge badge-daily">Diário</span>
        <span class="section-desc">Registrado a cada dia do mês</span>
        <span class="section-count" id="cnt-daily">0</span>
        <span class="section-arrow open" id="arr-daily">▼</span>
      </div>
      <div class="section-body open" id="body-daily">
        <div class="habits-list" id="list-daily"></div>
        <button class="add-habit-btn" onclick="addHabit('daily')">+ Adicionar hábito diário</button>
      </div>
    </div>

    <!-- Hábitos Semanais -->
    <div class="section-card" id="sc-weekly">
      <div class="section-head" onclick="toggleSection('weekly')">
        <span class="section-badge badge-weekly">Semanal</span>
        <span class="section-desc">Registrado por semana (1–5)</span>
        <span class="section-count" id="cnt-weekly">0</span>
        <span class="section-arrow" id="arr-weekly">▼</span>
      </div>
      <div class="section-body" id="body-weekly">
        <div class="habits-list" id="list-weekly"></div>
        <button class="add-habit-btn" onclick="addHabit('weekly')">+ Adicionar hábito semanal</button>
      </div>
    </div>

    <!-- Metas Mensais -->
    <div class="section-card" id="sc-monthly">
      <div class="section-head" onclick="toggleSection('monthly')">
        <span class="section-badge badge-monthly">Mensal</span>
        <span class="section-desc">Metas do mês com caixa de seleção</span>
        <span class="section-count" id="cnt-monthly">0</span>
        <span class="section-arrow" id="arr-monthly">▼</span>
      </div>
      <div class="section-body" id="body-monthly">
        <div class="habits-list" id="list-monthly"></div>
        <button class="add-habit-btn" onclick="addMonthlyItem()">+ Adicionar meta mensal</button>
      </div>
    </div>

    <!-- Opções -->
    <div class="card">
      <div class="card-title">Opções do PDF</div>
      <div class="options-grid">
        <label class="opt-label"><input type="checkbox" id="opt-fill" onchange="saveState();updatePreview()" /> Círculos preenchidos</label>
        <label class="opt-label"><input type="checkbox" id="opt-weeks" checked onchange="saveState();updatePreview()" /> Separar semanas</label>
        <label class="opt-label"><input type="checkbox" id="opt-weekend" checked onchange="saveState();updatePreview()" /> Sombrear fins de semana</label>
        <label class="opt-label"><input type="checkbox" id="opt-nums" checked onchange="saveState();updatePreview()" /> Numerar hábitos</label>
      </div>
    </div>

    <!-- Preview -->
    <div class="card">
      <div class="card-title">Pré-visualização</div>
      <div class="preview-wrap" id="preview"></div>
    </div>

    <!-- Gerar -->
    <button class="generate-btn" id="gen-btn" onclick="generatePDF()" disabled>⬇ Gerar PDF</button>

    </div><!-- /mode-config -->

    <div id="mode-fill" style="display:none">
      <div class="card">
        <div class="fill-nav">
          <button class="fill-nav-btn" onclick="navigateFillMonth(-1)">‹</button>
          <span class="fill-month-title" id="fill-month-label"></span>
          <button class="fill-nav-btn" onclick="navigateFillMonth(1)">›</button>
        </div>
        <div id="fill-table-wrap"></div>
      </div>
    </div>

  </div>

  <p class="footer">IFRN · Campus João Câmara</p>

  <script>
    // ── Data ──
    const PALETTE = [
      '#93c5fd','#86efac','#f9a8d4','#fcd34d','#c4b5fd',
      '#fdba74','#67e8f9','#fca5a5','#a5b4fc','#d9f99d',
    ];
    const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const DAY_LETTERS = ['D','S','T','Q','Q','S','S']; // Sun-Sat

    let data = { daily: [], weekly: [], monthly: [] };
    let openPalette = null;

    // ── Helpers ──
    function hexToRgb(hex) {
      return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
    }
    function escH(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function getDays(month, year) {
      return new Date(year, MONTHS.indexOf(month) + 1, 0).getDate();
    }
    function getFirstDow(month, year) { // 0=Sun
      return new Date(year, MONTHS.indexOf(month), 1).getDay();
    }
    function totalHabits() {
      return data.daily.length + data.weekly.length + data.monthly.length;
    }

    // ── Section toggle ──
    function toggleSection(id) {
      const body = document.getElementById('body-' + id);
      const arr  = document.getElementById('arr-' + id);
      body.classList.toggle('open');
      arr.classList.toggle('open');
    }

    // ── Add / remove ──
    function addHabit(section, name = '', colorIdx = null) {
      const color = PALETTE[colorIdx !== null ? colorIdx : data[section].length % PALETTE.length];
      data[section].push({ name, color });
      renderSection(section);
      saveState();
      updatePreview();
    }

    function addMonthlyItem(name = '') {
      data.monthly.push({ name });
      renderSection('monthly');
      saveState();
      updatePreview();
    }

    function removeItem(section, idx) {
      data[section].splice(idx, 1);
      renderSection(section);
      saveState();
      updatePreview();
    }

    function moveItem(section, idx, dir) {
      const arr = data[section];
      const to = idx + dir;
      if (to < 0 || to >= arr.length) return;
      [arr[idx], arr[to]] = [arr[to], arr[idx]];
      renderSection(section);
      saveState();
      updatePreview();
    }

    function renderSection(section) {
      const list = document.getElementById('list-' + section);
      const cnt  = document.getElementById('cnt-' + section);
      const items = data[section];
      cnt.textContent = items.length || '';
      list.innerHTML = '';

      if (section === 'monthly') {
        items.forEach((item, i) => {
          const row = document.createElement('div');
          row.className = 'monthly-row';
          row.innerHTML = `
            <span class="habit-num">${i + 1}.</span>
            <input type="text" placeholder="Meta do mês" value="${escH(item.name)}"
              oninput="data.monthly[${i}].name=this.value;saveState();updatePreview()" style="flex:1" />
            <div class="move-btns">
              <button class="move-btn" onclick="moveItem('monthly',${i},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
              <button class="move-btn" onclick="moveItem('monthly',${i},1)" ${i === items.length - 1 ? 'disabled' : ''}>▼</button>
            </div>
            <button class="remove-btn" onclick="removeItem('monthly',${i})">×</button>
          `;
          list.appendChild(row);
        });
      } else {
        items.forEach((h, i) => {
          const row = document.createElement('div');
          row.className = 'habit-row';
          row.innerHTML = `
            <span class="habit-num">${i + 1}.</span>
            <input type="text" placeholder="Nome do hábito" value="${escH(h.name)}"
              oninput="data['${section}'][${i}].name=this.value;saveState();updatePreview()" style="flex:1" />
            <div class="color-wrap" id="cw-${section}-${i}">
              <div class="color-dot" style="background:${h.color}"
                onclick="togglePalette('${section}',${i},event)" title="Cor"></div>
              <div class="palette" id="pal-${section}-${i}">
                ${PALETTE.map((c,pi) => `
                  <div class="pal-swatch ${c===h.color?'sel':''}" style="background:${c}"
                    onclick="setColor('${section}',${i},'${c}',event)"></div>
                `).join('')}
              </div>
            </div>
            <div class="move-btns">
              <button class="move-btn" onclick="moveItem('${section}',${i},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
              <button class="move-btn" onclick="moveItem('${section}',${i},1)" ${i === items.length - 1 ? 'disabled' : ''}>▼</button>
            </div>
            <button class="remove-btn" onclick="removeItem('${section}',${i})">×</button>
          `;
          list.appendChild(row);
        });
      }

      document.getElementById('gen-btn').disabled = totalHabits() === 0;
    }

    function togglePalette(sec, idx, e) {
      e.stopPropagation();
      const pal = document.getElementById(`pal-${sec}-${idx}`);
      if (openPalette && openPalette !== pal) openPalette.classList.remove('open');
      pal.classList.toggle('open');
      openPalette = pal.classList.contains('open') ? pal : null;
    }
    function setColor(sec, idx, color, e) {
      e.stopPropagation();
      data[sec][idx].color = color;
      if (openPalette) { openPalette.classList.remove('open'); openPalette = null; }
      renderSection(sec);
      saveState();
      updatePreview();
    }
    document.addEventListener('click', () => {
      if (openPalette) { openPalette.classList.remove('open'); openPalette = null; }
    });

    // ── Preview ──
    function updatePreview() {
      const el = document.getElementById('preview');
      if (totalHabits() === 0) {
        el.innerHTML = '<div class="empty-state">Adicione hábitos para visualizar</div>';
        return;
      }
      const month  = document.getElementById('sel-month').value;
      const year   = parseInt(document.getElementById('inp-year').value);
      const nDays  = getDays(month, year);
      const firstDow = getFirstDow(month, year);
      const fill   = document.getElementById('opt-fill').checked;
      const weeks  = document.getElementById('opt-weeks').checked;
      const wkend  = document.getElementById('opt-weekend').checked;
      const nums   = document.getElementById('opt-nums').checked;

      const days = Array.from({length: nDays}, (_,i) => i + 1);

      function dayStyle(d) {
        const dow = (firstDow + d - 1) % 7;
        const isWkend = wkend && (dow === 0 || dow === 6);
        const isWeekSep = weeks && d > 1 && (d - 1) % 7 === 0;
        let s = '';
        if (isWkend) s += 'background:rgba(100,116,139,.08);';
        if (isWeekSep) s += 'border-left:1.5px solid var(--card-border);';
        return s;
      }

      let html = '';

      // Daily
      if (data.daily.length > 0) {
        html += `<div class="psec-label">Diário</div>`;
        html += `<table class="preview-table"><thead><tr>
          <th class="ph">Hábito</th>
          ${days.map(d => `<th style="${dayStyle(d)}">${d}</th>`).join('')}
        </tr></thead><tbody>`;
        data.daily.forEach((h,i) => {
          html += `<tr><td class="pn">${nums?`${i+1}. `:''}${escH(h.name)||`Hábito ${i+1}`}</td>
            ${days.map(d => {
              const bg = fill ? h.color : 'transparent';
              return `<td style="${dayStyle(d)}"><div class="pdot" style="background:${bg};border-color:${h.color}"></div></td>`;
            }).join('')}
          </tr>`;
        });
        html += '</tbody></table>';
      }

      // Weekly
      if (data.weekly.length > 0) {
        html += `<div class="psec-label" style="margin-top:8px">Semanal</div>`;
        html += `<table class="preview-table"><thead><tr>
          <th class="ph">Hábito</th>
          ${[1,2,3,4,5].map(w => `<th style="min-width:36px">Sem ${w}</th>`).join('')}
        </tr></thead><tbody>`;
        data.weekly.forEach((h,i) => {
          html += `<tr><td class="pn">${nums?`${i+1}. `:''}${escH(h.name)||`Hábito ${i+1}`}</td>
            ${[0,1,2,3,4].map(() => {
              const bg = fill ? h.color : 'transparent';
              return `<td><div class="psq" style="background:${bg};border-color:${h.color}"></div></td>`;
            }).join('')}
          </tr>`;
        });
        html += '</tbody></table>';
      }

      // Monthly
      if (data.monthly.length > 0) {
        html += `<div class="psec-label" style="margin-top:8px">Mensal</div>`;
        html += `<table class="preview-table"><thead><tr>
          <th class="ph">Meta</th><th>✓</th>
        </tr></thead><tbody>`;
        data.monthly.forEach((item,i) => {
          html += `<tr><td class="pn">${escH(item.name)||`Meta ${i+1}`}</td>
            <td><div class="psq" style="border-color:#94a3b8;background:transparent;width:12px;height:12px;border-radius:3px"></div></td>
          </tr>`;
        });
        html += '</tbody></table>';
      }

      el.innerHTML = html;
    }

    // ── PDF Generation ──
    function generatePDF() {
      if (totalHabits() === 0) return;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

      const month   = document.getElementById('sel-month').value;
      const year    = parseInt(document.getElementById('inp-year').value);
      const userName = document.getElementById('inp-name').value.trim();
      const nDays   = getDays(month, year);
      const firstDow = getFirstDow(month, year);
      const fill    = document.getElementById('opt-fill').checked;
      const weeksep = document.getElementById('opt-weeks').checked;
      const wkend   = document.getElementById('opt-weekend').checked;
      const nums    = document.getElementById('opt-nums').checked;

      const hasDly = data.daily.length > 0;
      const hasWkl = data.weekly.length > 0;
      const hasMly = data.monthly.length > 0;
      const hasBot = hasWkl || hasMly;

      // ── Layout constants ──
      const PW = 297, PH = 210;
      const ML = 10, MR = 10, MT = 10, MB = 10;
      const LBL_W = 13;    // rotated section label column
      const NAME_W = 58;   // habit name column

      // Accent bar at top
      doc.setFillColor(99, 102, 241);
      doc.rect(0, 0, PW, 3, 'F');

      // Month title (top-right)
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(17);
      doc.setTextColor(70, 70, 80);
      doc.text(`${month} ${year}`, PW - MR, MT + 10, { align: 'right' });

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6);
      doc.setTextColor(160, 160, 170);
      doc.text('MÊS', PW - MR, MT + 15, { align: 'right' });

      if (userName) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(13);
        doc.setTextColor(70, 70, 80);
        doc.text(userName, ML, MT + 10);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(6);
        doc.setTextColor(160, 160, 170);
        doc.text('NOME', ML, MT + 15);
      }

      // Content vertical bounds
      const contentTop = MT + 19;  // y=29
      const contentBot = PH - MB;  // y=200

      // Split between daily and bottom sections
      let dailyBot, botTop;
      if (hasBot) {
        dailyBot = contentTop + (contentBot - contentTop) * 0.63;
        botTop   = dailyBot + 4;
      } else {
        dailyBot = contentBot;
        botTop   = null;
      }

      // ── Grid helpers ──
      const gridLeft = ML + LBL_W + NAME_W; // x where day columns start
      const gridW    = PW - gridLeft - MR;
      const colW     = gridW / nDays;

      function dayDow(d) { return (firstDow + d - 1) % 7; }
      function isWeekend(d) { const dow = dayDow(d); return dow === 0 || dow === 6; }
      function isWeekSep(d) { return weeksep && d > 1 && (d - 1) % 7 === 0; }

      // Shade a day column in the grid (x = gridLeft + (d-1)*colW)
      function shadeCol(d, y1, h, rgba) {
        const x = gridLeft + (d - 1) * colW;
        doc.setFillColor(rgba[0], rgba[1], rgba[2]);
        doc.setGState(doc.GState({ opacity: rgba[3] }));
        doc.rect(x, y1, colW, h, 'F');
        doc.setGState(doc.GState({ opacity: 1 }));
      }

      // Draw a circle or square at (cx, cy)
      function drawCircle(cx, cy, r, color, filled) {
        const { r: cr, g: cg, b: cb } = hexToRgb(color);
        if (filled) {
          doc.setFillColor(cr, cg, cb);
          doc.setDrawColor(cr, cg, cb);
          doc.circle(cx, cy, r, 'FD');
        } else {
          // Light tint fill + colored stroke
          doc.setFillColor(Math.min(255,cr+70), Math.min(255,cg+70), Math.min(255,cb+70));
          doc.setDrawColor(cr, cg, cb);
          doc.setLineWidth(0.35);
          doc.circle(cx, cy, r, 'FD');
        }
      }

      function drawSquare(cx, cy, s, color, filled) {
        const { r: cr, g: cg, b: cb } = hexToRgb(color);
        if (filled) {
          doc.setFillColor(cr, cg, cb);
          doc.setDrawColor(cr, cg, cb);
        } else {
          doc.setFillColor(Math.min(255,cr+70), Math.min(255,cg+70), Math.min(255,cb+70));
          doc.setDrawColor(cr, cg, cb);
        }
        doc.setLineWidth(0.35);
        doc.roundedRect(cx - s, cy - s, s * 2, s * 2, 0.5, 0.5, filled ? 'FD' : 'FD');
      }

      // ── DAILY SECTION ──
      if (hasDly) {
        const n = data.daily.length;
        const availH = dailyBot - contentTop;

        // Day header height
        const DHDR = 12;
        const rowH = Math.min(10, (availH - DHDR) / Math.max(n, 1));
        const rowsH = rowH * n;
        const gridTop = contentTop + DHDR;

        // "DIÁRIO" rotated label
        const lx = ML + LBL_W / 2;
        const ly = gridTop + rowsH / 2;
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7);
        doc.setTextColor(120, 120, 130);
        doc.text('DIÁRIO', lx, ly, { angle: 90, align: 'center' });

        // Day numbers + DOW letters header
        for (let d = 1; d <= nDays; d++) {
          const cx = gridLeft + (d - 1) * colW + colW / 2;
          const dow = dayDow(d);
          const isWknd = isWeekend(d);

          // Header bg for weekends
          if (wkend && isWknd) {
            doc.setFillColor(235, 238, 245);
            doc.rect(gridLeft + (d-1)*colW, contentTop, colW, DHDR, 'F');
          }

          doc.setFont('helvetica', 'bold');
          doc.setFontSize(6.5);
          doc.setTextColor(isWknd && wkend ? 130 : 100, isWknd && wkend ? 130 : 110, isWknd && wkend ? 150 : 120);
          doc.text(String(d), cx, contentTop + 5, { align: 'center' });

          doc.setFont('helvetica', 'normal');
          doc.setFontSize(5.5);
          doc.setTextColor(isWknd && wkend ? 140 : 160, 160, 175);
          doc.text(DAY_LETTERS[dow], cx, contentTop + 10, { align: 'center' });
        }

        // Habit rows
        data.daily.forEach((h, i) => {
          const y = gridTop + i * rowH;

          // Row background
          if (i % 2 === 0) {
            doc.setFillColor(249, 249, 252);
            doc.rect(ML + LBL_W, y, NAME_W + gridW, rowH, 'F');
          }

          // Weekend column shading over rows
          if (wkend) {
            for (let d = 1; d <= nDays; d++) {
              if (isWeekend(d)) {
                doc.setFillColor(230, 233, 243);
                doc.setGState(doc.GState({ opacity: 0.4 }));
                doc.rect(gridLeft + (d-1)*colW, y, colW, rowH, 'F');
                doc.setGState(doc.GState({ opacity: 1 }));
              }
            }
          }

          // Name cell
          doc.setDrawColor(215, 215, 225);
          doc.setLineWidth(0.1);
          doc.rect(ML + LBL_W, y, NAME_W, rowH);

          // Color stripe on left of name cell
          const { r: sr, g: sg, b: sb } = hexToRgb(h.color);
          doc.setFillColor(sr, sg, sb);
          doc.rect(ML + LBL_W, y, 2.5, rowH, 'F');

          // Habit name
          const label = (nums ? `${i+1}. ` : '') + (h.name.trim() || `Hábito ${i+1}`);
          const truncated = doc.splitTextToSize(label, NAME_W - 7)[0];
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(55, 55, 65);
          doc.text(truncated, ML + LBL_W + 5, y + rowH / 2 + 1.3);

          // Circles
          const cr2 = Math.min(2.7, rowH * 0.27);
          for (let d = 1; d <= nDays; d++) {
            const cx = gridLeft + (d - 1) * colW + colW / 2;
            const cy = y + rowH / 2;
            drawCircle(cx, cy, cr2, h.color, fill);
          }

          // Row lines
          doc.setDrawColor(215, 215, 225);
          doc.setLineWidth(0.08);
          doc.line(gridLeft, y, gridLeft + gridW, y);
          doc.line(gridLeft, y + rowH, gridLeft + gridW, y + rowH);
        });

        // Vertical separators
        for (let d = 1; d < nDays; d++) {
          const x = gridLeft + d * colW;
          if (isWeekSep(d + 1)) {
            doc.setDrawColor(160, 160, 180);
            doc.setLineWidth(0.5);
          } else {
            doc.setDrawColor(215, 215, 225);
            doc.setLineWidth(0.08);
          }
          doc.line(x, gridTop, x, gridTop + rowsH);
        }

        // Outer borders
        doc.setDrawColor(170, 170, 185);
        doc.setLineWidth(0.4);
        doc.rect(ML + LBL_W, gridTop, NAME_W + gridW, rowsH);
        doc.rect(ML + LBL_W, contentTop, NAME_W + gridW, DHDR);

        // Day header outer border
        doc.setDrawColor(170, 170, 185);
        doc.setLineWidth(0.3);
        doc.rect(gridLeft, contentTop, gridW, DHDR);
      }

      // ── WEEKLY SECTION ──
      if (hasWkl && botTop) {
        const n = data.weekly.length;
        const botH = contentBot - botTop;
        const WHDR = 10;
        const rowH = Math.min(9, (botH - WHDR) / Math.max(n, 1));
        const rowsH = rowH * n;
        const gridTop = botTop + WHDR;

        // Area width (left 60% if monthly exists, else full)
        const areaW = hasMly ? (PW - ML - MR) * 0.57 : (PW - ML - MR);
        const wGridLeft = ML + LBL_W + NAME_W;
        const wGridW = ML + areaW - wGridLeft;
        const WEEKS = 5;
        const wColW = wGridW / WEEKS;

        // "SEMANAL" label
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7);
        doc.setTextColor(120, 120, 130);
        doc.text('SEMANAL', ML + LBL_W / 2, gridTop + rowsH / 2, { angle: 90, align: 'center' });

        // Week headers
        for (let w = 1; w <= WEEKS; w++) {
          const cx = wGridLeft + (w - 1) * wColW + wColW / 2;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(6);
          doc.setTextColor(120, 120, 130);
          doc.text(`SEM ${w}`, cx, botTop + 7, { align: 'center' });
        }

        data.weekly.forEach((h, i) => {
          const y = gridTop + i * rowH;
          if (i % 2 === 0) {
            doc.setFillColor(249, 249, 252);
            doc.rect(ML + LBL_W, y, NAME_W + wGridW, rowH, 'F');
          }

          // Color stripe
          const { r: sr, g: sg, b: sb } = hexToRgb(h.color);
          doc.setFillColor(sr, sg, sb);
          doc.rect(ML + LBL_W, y, 2.5, rowH, 'F');

          doc.setDrawColor(215, 215, 225);
          doc.setLineWidth(0.1);
          doc.rect(ML + LBL_W, y, NAME_W, rowH);

          const label = (nums ? `${i+1}. ` : '') + (h.name.trim() || `Hábito ${i+1}`);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(55, 55, 65);
          doc.text(doc.splitTextToSize(label, NAME_W - 7)[0], ML + LBL_W + 5, y + rowH / 2 + 1.3);

          const sq = Math.min(2.3, rowH * 0.25);
          for (let w = 0; w < WEEKS; w++) {
            const cx = wGridLeft + w * wColW + wColW / 2;
            const cy = y + rowH / 2;
            drawSquare(cx, cy, sq, h.color, fill);
          }

          doc.setDrawColor(215, 215, 225);
          doc.setLineWidth(0.08);
          doc.line(wGridLeft, y, wGridLeft + wGridW, y);
          doc.line(wGridLeft, y + rowH, wGridLeft + wGridW, y + rowH);
        });

        // Week column separators
        for (let w = 1; w < WEEKS; w++) {
          const x = wGridLeft + w * wColW;
          doc.setDrawColor(215, 215, 225);
          doc.setLineWidth(0.1);
          doc.line(x, gridTop, x, gridTop + rowsH);
        }

        doc.setDrawColor(170, 170, 185);
        doc.setLineWidth(0.4);
        doc.rect(ML + LBL_W, gridTop, NAME_W + wGridW, rowsH);
        doc.rect(ML + LBL_W, botTop, NAME_W + wGridW, WHDR);
      }

      // ── MONTHLY SECTION ──
      if (hasMly && botTop) {
        const n = data.monthly.length;
        const botH = contentBot - botTop;
        const MHDR = 10;
        const rowH = Math.min(9, (botH - MHDR) / Math.max(n, 1));
        const rowsH = rowH * n;
        const gridTop = botTop + MHDR;

        const mX = hasWkl ? ML + (PW - ML - MR) * 0.60 : ML;
        const mW = PW - mX - MR;
        const CHK_W = 12;  // checkbox column
        const mNameW = mW - CHK_W;
        const mGridLeft = mX + mNameW;

        // "MENSAL" label (inside the box since it's smaller)
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(6);
        doc.setTextColor(120, 120, 130);
        doc.text('MENSAL', mX + mNameW / 2, botTop + 7, { align: 'center' });
        doc.text('✓', mGridLeft + CHK_W / 2, botTop + 7, { align: 'center' });

        data.monthly.forEach((item, i) => {
          const y = gridTop + i * rowH;
          if (i % 2 === 0) {
            doc.setFillColor(249, 249, 252);
            doc.rect(mX, y, mW, rowH, 'F');
          }

          // Left gold stripe
          doc.setFillColor(245, 158, 11);
          doc.rect(mX, y, 2.5, rowH, 'F');

          const label = (item.name.trim() || `Meta ${i+1}`);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(55, 55, 65);
          doc.text(doc.splitTextToSize(label, mNameW - 7)[0], mX + 5, y + rowH / 2 + 1.3);

          // Checkbox
          doc.setDrawColor(160, 160, 175);
          doc.setLineWidth(0.35);
          const sq = 2.2;
          doc.roundedRect(mGridLeft + CHK_W/2 - sq, y + rowH/2 - sq, sq*2, sq*2, 0.4, 0.4, 'S');

          doc.setDrawColor(215, 215, 225);
          doc.setLineWidth(0.08);
          doc.line(mX, y, mX + mW, y);
          doc.line(mX, y + rowH, mX + mW, y + rowH);
        });

        doc.setDrawColor(170, 170, 185);
        doc.setLineWidth(0.4);
        doc.rect(mX, gridTop, mW, rowsH);
        doc.rect(mX, botTop, mW, MHDR);
      }

      // ── Footer ──
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(10);
      doc.setTextColor(130, 130, 145);
      doc.text(
        '"Nós somos o que fazemos repetidamente. A excelência, portanto, não é um ato, mas um hábito." — Aristóteles',
        ML, PH - MB + 5
      );

      doc.save(`rastreador-${month.toLowerCase()}-${year}.pdf`);
    }

    // ── Persistence ──
    function saveState() {
      localStorage.setItem('habit-tracker', JSON.stringify({
        data,
        name:    document.getElementById('inp-name').value,
        month:   document.getElementById('sel-month').value,
        year:    document.getElementById('inp-year').value,
        opts: {
          fill:    document.getElementById('opt-fill').checked,
          weeks:   document.getElementById('opt-weeks').checked,
          weekend: document.getElementById('opt-weekend').checked,
          nums:    document.getElementById('opt-nums').checked,
        }
      }));
    }

    function loadState() {
      const raw = localStorage.getItem('habit-tracker');
      if (!raw) return false;
      try {
        const s = JSON.parse(raw);
        data = s.data || { daily: [], weekly: [], monthly: [] };
        document.getElementById('inp-name').value  = s.name  || '';
        document.getElementById('sel-month').value = s.month || MONTHS[new Date().getMonth()];
        document.getElementById('inp-year').value  = s.year  || new Date().getFullYear();
        if (s.opts) {
          document.getElementById('opt-fill').checked    = s.opts.fill    ?? false;
          document.getElementById('opt-weeks').checked   = s.opts.weeks   ?? true;
          document.getElementById('opt-weekend').checked = s.opts.weekend ?? true;
          document.getElementById('opt-nums').checked    = s.opts.nums    ?? true;
        }
        ['daily', 'weekly', 'monthly'].forEach(sec => renderSection(sec));
        return true;
      } catch { return false; }
    }

    // ── Fill mode ──
    let fillMonth = MONTHS[new Date().getMonth()];
    let fillYear  = new Date().getFullYear();

    function getChecksKey(m, y) { return `habit-tracker-checks-${m}-${y}`; }
    function loadChecks(m, y) {
      try { return JSON.parse(localStorage.getItem(getChecksKey(m, y))) || {}; } catch { return {}; }
    }
    function saveChecks(m, y, ch) {
      localStorage.setItem(getChecksKey(m, y), JSON.stringify(ch));
    }

    function toggleCheck(type, hIdx, key) {
      const ch = loadChecks(fillMonth, fillYear);
      if (type === 'monthly') {
        if (!ch.monthly) ch.monthly = {};
        ch.monthly[hIdx] = !ch.monthly[hIdx];
      } else {
        if (!ch[type]) ch[type] = {};
        if (!ch[type][hIdx]) ch[type][hIdx] = {};
        ch[type][hIdx][key] = !ch[type][hIdx][key];
      }
      saveChecks(fillMonth, fillYear, ch);
      renderFillTable();
    }

    function navigateFillMonth(dir) {
      let idx = MONTHS.indexOf(fillMonth) + dir;
      if (idx < 0)  { idx = 11; fillYear--; }
      if (idx > 11) { idx = 0;  fillYear++; }
      fillMonth = MONTHS[idx];
      document.getElementById('fill-month-label').textContent = `${fillMonth} ${fillYear}`;
      renderFillTable();
    }

    function setMode(mode) {
      document.getElementById('mode-config').style.display = mode === 'config' ? '' : 'none';
      document.getElementById('mode-fill').style.display   = mode === 'fill'   ? '' : 'none';
      document.getElementById('tab-config').classList.toggle('active', mode === 'config');
      document.getElementById('tab-fill').classList.toggle('active', mode === 'fill');
      if (mode === 'fill') {
        document.getElementById('fill-month-label').textContent = `${fillMonth} ${fillYear}`;
        renderFillTable();
      }
    }

    function renderFillTable() {
      const el = document.getElementById('fill-table-wrap');
      if (!el) return;
      const nDays    = getDays(fillMonth, fillYear);
      const firstDow = getFirstDow(fillMonth, fillYear);
      const ch       = loadChecks(fillMonth, fillYear);
      const days     = Array.from({length: nDays}, (_, i) => i + 1);

      if (data.daily.length + data.weekly.length + data.monthly.length === 0) {
        el.innerHTML = '<div class="empty-state">Configure hábitos primeiro</div>';
        return;
      }

      let html = '';

      if (data.daily.length > 0) {
        const dc = ch.daily || {};
        html += `<div class="fill-section-label">Diário</div>`;
        html += `<div class="fill-scroll"><table class="fill-table"><thead><tr>`;
        html += `<th class="fill-name-th">Hábito</th>`;
        days.forEach(d => {
          const dow = (firstDow + d - 1) % 7;
          const w   = dow === 0 || dow === 6;
          html += `<th class="${w ? 'fill-wknd' : ''}">${d}<br><span class="fill-dow">${DAY_LETTERS[dow]}</span></th>`;
        });
        html += `<th class="fill-stat-th">%</th></tr></thead><tbody>`;
        data.daily.forEach((h, i) => {
          const hc  = dc[i] || {};
          const cnt = Object.values(hc).filter(Boolean).length;
          const pct = Math.round(cnt / nDays * 100);
          html += `<tr><td class="fill-name-td"><span class="fill-stripe" style="background:${h.color}"></span>${escH(h.name || `Hábito ${i+1}`)}</td>`;
          days.forEach(d => {
            const dow = (firstDow + d - 1) % 7;
            const w   = dow === 0 || dow === 6;
            const bg  = hc[d] ? h.color : 'transparent';
            html += `<td class="${w ? 'fill-wknd' : ''}"><div class="fill-cell" onclick="toggleCheck('daily',${i},${d})"><div class="fill-dot" style="background:${bg};border-color:${h.color}"></div></div></td>`;
          });
          html += `<td class="fill-stat"><div class="fill-bar"><div class="fill-bar-inner" style="width:${pct}%;background:${h.color}"></div></div><span>${pct}%</span></td></tr>`;
        });
        html += `</tbody></table></div>`;
      }

      if (data.weekly.length > 0) {
        const wc = ch.weekly || {};
        html += `<div class="fill-section-label" style="margin-top:16px">Semanal</div>`;
        html += `<table class="fill-table" style="max-width:440px"><thead><tr>`;
        html += `<th class="fill-name-th">Hábito</th>`;
        [1,2,3,4,5].forEach(w => html += `<th style="min-width:52px">Sem ${w}</th>`);
        html += `<th class="fill-stat-th">%</th></tr></thead><tbody>`;
        data.weekly.forEach((h, i) => {
          const hc  = wc[i] || {};
          const cnt = Object.values(hc).filter(Boolean).length;
          const pct = Math.round(cnt / 5 * 100);
          html += `<tr><td class="fill-name-td"><span class="fill-stripe" style="background:${h.color}"></span>${escH(h.name || `Hábito ${i+1}`)}</td>`;
          [0,1,2,3,4].forEach(w => {
            const bg = hc[w] ? h.color : 'transparent';
            html += `<td><div class="fill-cell" onclick="toggleCheck('weekly',${i},${w})"><div class="fill-sq" style="background:${bg};border-color:${h.color}"></div></div></td>`;
          });
          html += `<td class="fill-stat"><div class="fill-bar"><div class="fill-bar-inner" style="width:${pct}%;background:${h.color}"></div></div><span>${pct}%</span></td></tr>`;
        });
        html += `</tbody></table>`;
      }

      if (data.monthly.length > 0) {
        const mc = ch.monthly || {};
        html += `<div class="fill-section-label" style="margin-top:16px">Metas mensais</div>`;
        html += `<div class="fill-monthly-list">`;
        data.monthly.forEach((item, i) => {
          const checked = !!mc[i];
          html += `<div class="fill-monthly-item${checked ? ' checked' : ''}" onclick="toggleCheck('monthly',${i},0)">
            <div class="fill-monthly-check" style="border-color:${checked ? '#6366f1' : 'var(--text-muted)'};background:${checked ? '#6366f1' : 'transparent'}">${checked ? '✓' : ''}</div>
            <span>${escH(item.name || `Meta ${i+1}`)}</span>
          </div>`;
        });
        html += `</div>`;
      }

      el.innerHTML = html;
    }

    // ── Theme ──
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      setTheme(cur === 'dark' ? 'light' : 'dark');
    }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      const dark = t === 'dark';
      document.getElementById('theme-icon').textContent = dark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = dark ? 'Claro' : 'Escuro';
    }
    setTheme(localStorage.getItem('theme') || 'dark');

    // ── Init ──
    document.getElementById('sel-month').selectedIndex = new Date().getMonth();

    if (!loadState()) {
      ['Acordar às 6h', 'Exercício físico', 'Leitura', 'Beber 2L de água', 'Meditação']
        .forEach((n, i) => addHabit('daily', n, i));

      ['Limpar o quarto', 'Planejar a semana']
        .forEach((n, i) => addHabit('weekly', n, i + 2));

      ['Revisar metas do mês', 'Consulta médica (se necessário)', 'Guardar uma quantia']
        .forEach(n => addMonthlyItem(n));

      ['weekly', 'monthly'].forEach(s => {
        document.getElementById('body-' + s).classList.remove('open');
        document.getElementById('arr-' + s).classList.remove('open');
      });
    }

    updatePreview();
  </script>

</body>
</html>
