<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorteio — César Azevedo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    [data-theme="dark"] {
      --bg: #0f1117;
      --card-bg: #1e2130;
      --card-border: #2a2f45;
      --text-h: #f1f5f9;
      --text-sub: #94a3b8;
      --text-muted: #64748b;
      --footer: #2a2f45;
      --grid-line: rgba(255,255,255,.03);
      --shadow: rgba(0,0,0,.35);
      --toggle-bg: #1e2130;
      --toggle-border: #2a2f45;
      --input-bg: #131720;
      --wheel-center: #0f1117;
      --wheel-stroke: #0f1117;
      --pointer: #f1f5f9;
    }
    [data-theme="light"] {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --card-border: #dde3ec;
      --text-h: #0f172a;
      --text-sub: #475569;
      --text-muted: #94a3b8;
      --footer: #94a3b8;
      --grid-line: rgba(0,0,0,.04);
      --shadow: rgba(0,0,0,.10);
      --toggle-bg: #ffffff;
      --toggle-border: #dde3ec;
      --input-bg: #f8fafc;
      --wheel-center: #ffffff;
      --wheel-stroke: #ffffff;
      --pointer: #0f172a;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 40px 16px 60px;
      transition: background .3s;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .theme-toggle {
      position: fixed; top: 18px; right: 18px;
      background: var(--toggle-bg); border: 1px solid var(--toggle-border);
      border-radius: 999px; padding: 6px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      font-size: .82rem; color: var(--text-sub);
      transition: background .3s, border-color .3s, color .2s;
      user-select: none; box-shadow: 0 2px 8px var(--shadow); z-index: 10;
    }
    .theme-toggle:hover { color: var(--text-h); }

    .back-btn {
      position: fixed; top: 18px; left: 18px;
      background: var(--toggle-bg); border: 1px solid var(--toggle-border);
      border-radius: 999px; padding: 6px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      font-size: .82rem; color: var(--text-sub); text-decoration: none;
      transition: background .3s, border-color .3s, color .2s;
      box-shadow: 0 2px 8px var(--shadow); z-index: 10;
    }
    .back-btn:hover { color: var(--text-h); }

    .container { width: 100%; max-width: 560px; margin-top: 20px; position: relative; z-index: 1; }

    .header { text-align: center; margin-bottom: 28px; }
    .header .icon-wrap {
      width: 64px; height: 64px; border-radius: 16px;
      background: rgba(99,102,241,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 16px;
    }
    .header h1 { color: var(--text-h); font-size: 1.5rem; font-weight: 700; letter-spacing: -.3px; }
    .header p { color: var(--text-sub); font-size: .88rem; margin-top: 6px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 14px; padding: 6px;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .tab {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      background: none; color: var(--text-muted);
      transition: background .2s, color .2s;
    }
    .tab.active { background: rgba(99,102,241,.15); color: #818cf8; }
    .tab:hover:not(.active) { color: var(--text-sub); }

    /* Panels */
    .panel {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; padding: 24px; margin-bottom: 16px;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .panel-title {
      color: var(--text-sub); font-size: .75rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 14px;
    }

    textarea {
      width: 100%; min-height: 160px;
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text-h); font-family: inherit; font-size: .9rem;
      line-height: 1.6; resize: vertical; outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: var(--text-muted); }

    .counter { color: var(--text-muted); font-size: .78rem; margin-top: 6px; text-align: right; }

    /* Groups mode */
    .controls { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { color: var(--text-sub); font-size: .82rem; font-weight: 600; }

    input[type="number"] {
      width: 90px; background: var(--input-bg);
      border: 1px solid var(--card-border); border-radius: 10px;
      padding: 10px 12px; color: var(--text-h); font-family: inherit;
      font-size: .95rem; text-align: center; outline: none;
      transition: border-color .2s;
    }
    input[type="number"]:focus { border-color: #6366f1; }

    .mode-btns { display: flex; gap: 6px; }
    .mode-btn {
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 10px 14px;
      color: var(--text-sub); font-size: .82rem; cursor: pointer;
      transition: background .2s, border-color .2s, color .2s; white-space: nowrap;
    }
    .mode-btn.active {
      background: rgba(99,102,241,.15); border-color: #6366f1;
      color: #818cf8; font-weight: 600;
    }

    .btn-primary {
      flex: 1; min-width: 140px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 10px; padding: 12px 20px;
      color: #fff; font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: opacity .2s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: none; border: 1px solid var(--card-border);
      border-radius: 10px; padding: 12px 16px;
      color: var(--text-muted); font-size: .88rem; cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .btn-ghost:hover { color: var(--text-sub); border-color: var(--text-muted); }

    /* Groups results */
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .results-header h2 { color: var(--text-h); font-size: 1rem; font-weight: 600; }
    .btn-copy-all {
      background: none; border: 1px solid var(--card-border);
      border-radius: 8px; padding: 5px 12px;
      color: var(--text-muted); font-size: .78rem; cursor: pointer;
      transition: color .2s;
    }
    .btn-copy-all:hover { color: var(--text-sub); }

    .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .group-card {
      background: var(--input-bg); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 16px;
      animation: fadeIn .3s ease both;
    }
    .group-title { font-size: .78rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }
    .group-members { display: flex; flex-direction: column; gap: 4px; }
    .member { display: flex; align-items: center; gap: 8px; color: var(--text-h); font-size: .88rem; padding: 4px 0; }
    .member-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .empty-state { text-align: center; color: var(--text-muted); font-size: .88rem; padding: 32px 0 8px; }
    .empty-state .big { font-size: 2.5rem; margin-bottom: 10px; }

    /* Roleta mode */
    .wheel-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    .pointer-wrap { position: relative; width: 100%; display: flex; justify-content: center; }
    .pointer {
      width: 0; height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 24px solid var(--pointer);
      position: relative; z-index: 2;
      filter: drop-shadow(0 2px 4px var(--shadow));
      margin-bottom: -2px;
    }
    canvas#wheel {
      border-radius: 50%;
      display: block;
      box-shadow: 0 8px 32px var(--shadow);
      max-width: 100%;
    }

    .winner-banner {
      display: none;
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.2));
      border: 1px solid rgba(99,102,241,.4);
      border-radius: 14px; padding: 20px 24px;
      text-align: center; margin-top: 20px;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    .winner-banner.show { display: block; }
    .winner-label { color: var(--text-muted); font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .winner-name { color: var(--text-h); font-size: 1.6rem; font-weight: 700; }

    .spin-controls { display: flex; gap: 10px; margin-top: 20px; width: 100%; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .footer { margin-top: 40px; color: var(--footer); font-size: .75rem; }

    /* Group color classes */
    .gc0  { color:#60a5fa } .gc0  .member-dot,.gc0 .group-card  { background:#60a5fa }
    .gc1  { color:#34d399 } .gc1  .member-dot { background:#34d399 }
    .gc2  { color:#f87171 } .gc2  .member-dot { background:#f87171 }
    .gc3  { color:#fbbf24 } .gc3  .member-dot { background:#fbbf24 }
    .gc4  { color:#a78bfa } .gc4  .member-dot { background:#a78bfa }
    .gc5  { color:#fb923c } .gc5  .member-dot { background:#fb923c }
    .gc6  { color:#e879f9 } .gc6  .member-dot { background:#e879f9 }
    .gc7  { color:#2dd4bf } .gc7  .member-dot { background:#2dd4bf }
    .gc8  { color:#f472b6 } .gc8  .member-dot { background:#f472b6 }
    .gc9  { color:#86efac } .gc9  .member-dot { background:#86efac }
    .gc10 { color:#93c5fd } .gc10 .member-dot { background:#93c5fd }
    .gc11 { color:#fdba74 } .gc11 .member-dot { background:#fdba74 }
    .group-card.gc0  { border-left:3px solid #60a5fa }
    .group-card.gc1  { border-left:3px solid #34d399 }
    .group-card.gc2  { border-left:3px solid #f87171 }
    .group-card.gc3  { border-left:3px solid #fbbf24 }
    .group-card.gc4  { border-left:3px solid #a78bfa }
    .group-card.gc5  { border-left:3px solid #fb923c }
    .group-card.gc6  { border-left:3px solid #e879f9 }
    .group-card.gc7  { border-left:3px solid #2dd4bf }
    .group-card.gc8  { border-left:3px solid #f472b6 }
    .group-card.gc9  { border-left:3px solid #86efac }
    .group-card.gc10 { border-left:3px solid #93c5fd }
    .group-card.gc11 { border-left:3px solid #fdba74 }
  </style>
</head>
<body>

  <a class="back-btn" href="https://cesarazevedo.github.io">← Voltar</a>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span id="theme-icon">☀️</span>
    <span id="theme-label">Claro</span>
  </button>

  <div class="container">

    <div class="header">
      <div class="icon-wrap" id="header-icon">🎲</div>
      <h1 id="header-title">Sorteio de Grupos</h1>
      <p id="header-sub">Cole os nomes, escolha a quantidade e sorteie!</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-grupos" onclick="switchTab('grupos')">🎲 Grupos</button>
      <button class="tab" id="tab-roleta" onclick="switchTab('roleta')">🎡 Roleta</button>
    </div>

    <!-- Names panel (shared) -->
    <div class="panel">
      <div class="panel-title">Participantes</div>
      <textarea id="names-input"
        placeholder="Cole os nomes aqui, um por linha:&#10;&#10;Ana Silva&#10;Bruno Costa&#10;Carla Mendes&#10;..."
        oninput="updateCounter()"
      ></textarea>
      <div class="counter" id="counter">0 participantes</div>
    </div>

    <!-- ===== GRUPOS MODE ===== -->
    <div id="section-grupos">
      <div class="panel">
        <div class="panel-title">Configuração</div>
        <div class="controls">
          <div class="field">
            <label for="num-input" id="num-label">Nº de grupos</label>
            <input type="number" id="num-input" value="4" min="1" max="99" />
          </div>
          <div class="field">
            <label>Modo</label>
            <div class="mode-btns">
              <button class="mode-btn active" id="btn-mode-groups" onclick="setGroupMode('groups')">Por grupos</button>
              <button class="mode-btn" id="btn-mode-size" onclick="setGroupMode('size')">Por tamanho</button>
            </div>
          </div>
          <button class="btn-primary" onclick="sortGroups()">🎲 Sortear</button>
          <button class="btn-ghost" onclick="clearGroups()" title="Limpar">✕</button>
        </div>
      </div>

      <div class="panel">
        <div class="results-header">
          <h2 id="results-title">Resultado</h2>
          <button class="btn-copy-all" id="btn-copy" onclick="copyAll()" style="display:none">⧉ Copiar</button>
        </div>
        <div id="groups-grid" class="groups-grid">
          <div class="empty-state">
            <div class="big">🎲</div>
            Adicione participantes e clique em <strong>Sortear</strong>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== ROLETA MODE ===== -->
    <div id="section-roleta" style="display:none">
      <div class="panel">
        <div class="wheel-wrap">
          <div class="pointer-wrap"><div class="pointer"></div></div>
          <canvas id="wheel" width="340" height="340"></canvas>
        </div>

        <div class="winner-banner" id="winner-banner">
          <div class="winner-label">🎉 Sorteado!</div>
          <div class="winner-name" id="winner-name"></div>
        </div>

        <div class="spin-controls">
          <button class="btn-primary" id="btn-spin" onclick="spinWheel()">🎡 Girar</button>
          <button class="btn-ghost" id="btn-remove" onclick="removeWinner()" style="display:none" title="Remover da lista">✕ Remover</button>
        </div>
      </div>
    </div>

  </div>

  <p class="footer">César Azevedo · IFRN · Campus João Câmara</p>

  <script>
    // ─── Theme ───────────────────────────────────────────────────────────────
    const saved = localStorage.getItem('theme') || 'dark';
    setTheme(saved);

    function toggleTheme() {
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      if (currentTab === 'roleta') drawWheel();
    }
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const isDark = theme === 'dark';
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Claro' : 'Escuro';
    }

    // ─── Tabs ─────────────────────────────────────────────────────────────────
    let currentTab = 'grupos';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('section-grupos').style.display = tab === 'grupos' ? '' : 'none';
      document.getElementById('section-roleta').style.display = tab === 'roleta' ? '' : 'none';
      document.getElementById('tab-grupos').classList.toggle('active', tab === 'grupos');
      document.getElementById('tab-roleta').classList.toggle('active', tab === 'roleta');

      if (tab === 'roleta') {
        const hi = document.getElementById('header-icon');
        const ht = document.getElementById('header-title');
        const hs = document.getElementById('header-sub');
        hi.textContent = '🎡';
        ht.textContent = 'Roleta';
        hs.textContent = 'Sorteie um nome da lista com estilo!';
        drawWheel();
      } else {
        document.getElementById('header-icon').textContent = '🎲';
        document.getElementById('header-title').textContent = 'Sorteio de Grupos';
        document.getElementById('header-sub').textContent = 'Cole os nomes, escolha a quantidade e sorteie!';
      }
    }

    // ─── Shared helpers ───────────────────────────────────────────────────────
    function getNames() {
      return document.getElementById('names-input').value
        .split('\n').map(n => n.trim()).filter(n => n.length > 0);
    }
    function updateCounter() {
      const n = getNames().length;
      document.getElementById('counter').textContent =
        n === 0 ? '0 participantes' : n === 1 ? '1 participante' : `${n} participantes`;
      if (currentTab === 'roleta') { lastWinner = null; drawWheel(); }
    }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ─── Groups mode ─────────────────────────────────────────────────────────
    let groupMode = 'groups';
    let lastGroups = [];

    function setGroupMode(m) {
      groupMode = m;
      document.getElementById('btn-mode-groups').classList.toggle('active', m === 'groups');
      document.getElementById('btn-mode-size').classList.toggle('active', m === 'size');
      document.getElementById('num-label').textContent = m === 'groups' ? 'Nº de grupos' : 'Por grupo';
    }

    function sortGroups() {
      const names = getNames();
      if (!names.length) { alert('Adicione pelo menos um participante.'); return; }
      const num = parseInt(document.getElementById('num-input').value) || 1;
      const shuffled = shuffle(names);
      let groups = [];
      if (groupMode === 'groups') {
        const k = Math.min(num, names.length);
        groups = Array.from({ length: k }, () => []);
        shuffled.forEach((n, i) => groups[i % k].push(n));
      } else {
        const size = Math.max(1, num);
        for (let i = 0; i < shuffled.length; i += size) groups.push(shuffled.slice(i, i + size));
      }
      lastGroups = groups;
      renderGroups(groups);
    }

    function renderGroups(groups) {
      const grid = document.getElementById('groups-grid');
      const title = document.getElementById('results-title');
      const copyBtn = document.getElementById('btn-copy');
      if (!groups.length) {
        grid.innerHTML = '<div class="empty-state"><div class="big">🎲</div>Adicione participantes e clique em <strong>Sortear</strong></div>';
        copyBtn.style.display = 'none';
        title.textContent = 'Resultado';
        return;
      }
      const total = groups.reduce((s, g) => s + g.length, 0);
      title.textContent = `${groups.length} grupo${groups.length > 1 ? 's' : ''} · ${total} participante${total > 1 ? 's' : ''}`;
      copyBtn.style.display = '';
      grid.innerHTML = groups.map((members, gi) => {
        const ci = gi % 12;
        return `<div class="group-card gc${ci}" style="animation-delay:${gi*40}ms">
          <div class="group-title gc${ci}">Grupo ${gi + 1}</div>
          <div class="group-members">
            ${members.map(m => `<div class="member"><div class="member-dot"></div>${esc(m)}</div>`).join('')}
          </div></div>`;
      }).join('');
    }

    function clearGroups() {
      document.getElementById('names-input').value = '';
      document.getElementById('num-input').value = 4;
      updateCounter();
      lastGroups = [];
      renderGroups([]);
    }

    function copyAll() {
      if (!lastGroups.length) return;
      const text = lastGroups.map((m, gi) => `Grupo ${gi+1}:\n${m.map(n=>`  • ${n}`).join('\n')}`).join('\n\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btn-copy');
        btn.textContent = '✓ Copiado!';
        setTimeout(() => btn.textContent = '⧉ Copiar', 2000);
      });
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── Roleta ───────────────────────────────────────────────────────────────
    const WHEEL_COLORS = [
      '#6366f1','#3b82f6','#10b981','#f59e0b',
      '#ef4444','#8b5cf6','#ec4899','#14b8a6',
      '#f97316','#84cc16','#06b6d4','#a855f7',
    ];
    const DARK_TEXT_COLORS = new Set(['#f59e0b','#84cc16']);

    let wheelAngle = 0;
    let spinning = false;
    let animFrame = null;
    let lastWinner = null;
    let winnerIdx = -1;

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');

    function getCSSVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function drawWheel(angle) {
      if (angle !== undefined) wheelAngle = angle;
      const names = getNames();
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const r = Math.min(cx, cy) - 8;

      ctx.clearRect(0, 0, w, h);

      if (!names.length) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, 2 * Math.PI);
        ctx.fillStyle = getCSSVar('--card-border');
        ctx.fill();
        ctx.fillStyle = getCSSVar('--text-muted');
        ctx.font = '14px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Adicione participantes', cx, cy - 10);
        ctx.fillText('para ver a roleta', cx, cy + 12);
        return;
      }

      const n = names.length;
      const slice = (2 * Math.PI) / n;

      for (let i = 0; i < n; i++) {
        const start = wheelAngle + i * slice;
        const end = start + slice;
        const color = WHEEL_COLORS[i % WHEEL_COLORS.length];

        // Slice fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = getCSSVar('--wheel-stroke');
        ctx.lineWidth = 2;
        ctx.stroke();

        // Text
        const mid = start + slice / 2;
        const textR = r * 0.62;
        ctx.save();
        ctx.translate(cx + Math.cos(mid) * textR, cy + Math.sin(mid) * textR);
        ctx.rotate(mid + Math.PI / 2);

        const isDarkText = DARK_TEXT_COLORS.has(color);
        ctx.fillStyle = isDarkText ? '#1e293b' : '#ffffff';

        const maxLen = n <= 6 ? 18 : n <= 12 ? 14 : 10;
        const name = names[i].length > maxLen ? names[i].slice(0, maxLen - 1) + '…' : names[i];
        const fontSize = n <= 6 ? 14 : n <= 12 ? 12 : 10;
        ctx.font = `600 ${fontSize}px Segoe UI, system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(name, 0, 0);
        ctx.restore();
      }

      // Outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = getCSSVar('--wheel-stroke');
      ctx.lineWidth = 4;
      ctx.stroke();

      // Center circle
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
      ctx.fillStyle = getCSSVar('--wheel-center');
      ctx.fill();
      ctx.strokeStyle = getCSSVar('--wheel-stroke');
      ctx.lineWidth = 3;
      ctx.stroke();

      // Center dot
      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
      ctx.fillStyle = '#6366f1';
      ctx.fill();
    }

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function spinWheel() {
      const names = getNames();
      if (names.length < 2) { alert('Adicione pelo menos 2 participantes para sortear.'); return; }
      if (spinning) return;

      // Hide previous result
      document.getElementById('winner-banner').classList.remove('show');
      document.getElementById('btn-remove').style.display = 'none';
      spinning = true;
      document.getElementById('btn-spin').disabled = true;

      // Pick winner
      winnerIdx = Math.floor(Math.random() * names.length);
      const n = names.length;
      const slice = (2 * Math.PI) / n;

      // We want the center of winnerIdx slice to land at top = -π/2
      // Center of slice i at current rotation: wheelAngle + i*slice + slice/2
      // We need: finalAngle + winnerIdx*slice + slice/2 ≡ -π/2 (mod 2π)
      // finalAngle = -π/2 - winnerIdx*slice - slice/2
      const sliceCenter = -Math.PI / 2 - winnerIdx * slice - slice / 2;

      // Add enough full rotations to ensure we spin at least 6 times past current angle
      const minSpins = 6;
      let target = sliceCenter;
      while (target < wheelAngle + minSpins * 2 * Math.PI) target += 2 * Math.PI;

      const startAngle = wheelAngle;
      const duration = 4500 + Math.random() * 1000;
      const startTime = performance.now();

      function animate(now) {
        const t = Math.min((now - startTime) / duration, 1);
        wheelAngle = startAngle + (target - startAngle) * easeOut(t);
        drawWheel();
        if (t < 1) {
          animFrame = requestAnimationFrame(animate);
        } else {
          wheelAngle = target;
          drawWheel();
          spinning = false;
          document.getElementById('btn-spin').disabled = false;
          lastWinner = names[winnerIdx];
          showWinner(lastWinner);
        }
      }
      animFrame = requestAnimationFrame(animate);
    }

    function showWinner(name) {
      document.getElementById('winner-name').textContent = name;
      document.getElementById('winner-banner').classList.add('show');
      document.getElementById('btn-remove').style.display = '';
    }

    function removeWinner() {
      if (!lastWinner) return;
      const textarea = document.getElementById('names-input');
      const lines = textarea.value.split('\n');
      // Remove first exact match
      const idx = lines.findIndex(l => l.trim() === lastWinner);
      if (idx !== -1) lines.splice(idx, 1);
      textarea.value = lines.join('\n');
      updateCounter();
      lastWinner = null;
      document.getElementById('winner-banner').classList.remove('show');
      document.getElementById('btn-remove').style.display = 'none';
      drawWheel();
    }

    // Initial draw
    drawWheel();
  </script>

</body>
